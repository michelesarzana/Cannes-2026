<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#1d1d1f"/>
  <!-- Lion head simplified -->
  <ellipse cx="50" cy="48" rx="20" ry="18" fill="url(#gold)"/>
  <!-- Mane -->
  <circle cx="50" cy="44" r="28" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.7"/>
  <!-- Ears -->
  <ellipse cx="34" cy="32" rx="6" ry="7" fill="url(#gold)"/>
  <ellipse cx="66" cy="32" rx="6" ry="7" fill="url(#gold)"/>
  <!-- Eyes -->
  <circle cx="43" cy="45" r="3" fill="#1d1d1f"/>
  <circle cx="57" cy="45" r="3" fill="#1d1d1f"/>
  <circle cx="44" cy="44" r="1" fill="#fff"/>
  <circle cx="58" cy="44" r="1" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="50" cy="52" rx="4" ry="2.5" fill="#c07820"/>
  <!-- Mouth -->
  <path d="M46 55 Q50 59 54 55" stroke="#c07820" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="30" y1="51" x2="43" y2="53" stroke="#c07820" stroke-width="1" opacity="0.8"/>
  <line x1="30" y1="55" x2="43" y2="55" stroke="#c07820" stroke-width="1" opacity="0.8"/>
  <line x1="57" y1="53" x2="70" y2="51" stroke="#c07820" stroke-width="1" opacity="0.8"/>
  <line x1="57" y1="55" x2="70" y2="55" stroke="#c07820" stroke-width="1" opacity="0.8"/>
  <!-- Trophy base -->
  <rect x="42" y="72" width="16" height="4" rx="2" fill="url(#gold)"/>
  <rect x="38" y="76" width="24" height="3" rx="1.5" fill="url(#gold)"/>
</svg>
