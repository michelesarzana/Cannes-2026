<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cannes Lions 2026 — Winners</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<style>
/* RESET & VARS */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1d1d1f;--white:#f5f5f7;--off:#fbfbfd;--mid:#86868b;--light:#d2d2d7;
  --blue:#0071e3;--blue2:#0077ed;--gold:#f5a623;--silver:#8e8e93;--bronze:#8d6e63;
  --gp-grad:linear-gradient(135deg,#FFD700,#FFA500);
  --nav:rgba(255,255,255,0.85);--r:18px;--shadow:0 4px 24px rgba(0,0,0,0.08);
  --t:.3s cubic-bezier(.25,.46,.45,.94)
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  background:var(--off);color:var(--black);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:1000;background:var(--nav);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.08);height:52px;display:flex;align-items:center}
.nav-inner{max-width:1280px;width:100%;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:16px}
.nav-logo{font-size:16px;font-weight:700;color:var(--black);text-decoration:none;
  letter-spacing:-0.3px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-right:auto}
.nav-logo span{font-size:20px}
.nav-lucky{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;
  border-radius:980px;padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:-.2px;transition:transform var(--t),opacity var(--t)}
.nav-lucky:hover{transform:scale(1.04);opacity:.9}
.nav-about{background:none;border:none;font-size:14px;color:var(--mid);cursor:pointer;
  font-family:inherit;font-weight:500;padding:4px 8px;border-radius:6px;
  transition:color var(--t)}
.nav-about:hover{color:var(--black)}
.nav-back{display:none}
#app{min-height:100vh}

/* ===== HOME HERO ===== */
.hero{background:#000;color:#fff;min-height:82vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;
  position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a1a2e,#000)}
.hero-badge{position:relative;display:inline-block;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);border-radius:100px;padding:6px 16px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,0.75);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:28px;backdrop-filter:blur(10px)}
.hero h1{position:relative;font-size:clamp(52px,9vw,100px);font-weight:700;
  letter-spacing:-3px;line-height:.95;margin-bottom:20px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.55) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{position:relative;font-size:clamp(18px,2.5vw,24px);color:rgba(255,255,255,0.5);
  letter-spacing:-.3px;max-width:560px;margin-bottom:48px}
.hero-stats{position:relative;display:flex;gap:48px;margin-bottom:52px}
.stat-num{font-size:42px;font-weight:700;letter-spacing:-1.5px;color:#fff}
.stat-label{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;
  letter-spacing:1px;margin-top:4px}
.hero-cta{position:relative;display:inline-block;background:var(--blue);color:#fff;
  text-decoration:none;padding:14px 32px;border-radius:980px;font-size:15px;
  font-weight:500;cursor:pointer;border:none;font-family:inherit;
  transition:background var(--t),transform var(--t)}
.hero-cta:hover{background:var(--blue2);transform:scale(1.02)}

/* ===== HERO SEARCH ===== */
.hero-search-wrap{position:relative;width:100%;max-width:640px;margin-top:8px}
.hero-search-btn{display:flex;align-items:center;gap:12px;width:100%;background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);border-radius:980px;padding:13px 22px;
  cursor:text;backdrop-filter:blur(12px);transition:background var(--t),border-color var(--t)}
.hero-search-btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.4)}
.hero-search-btn svg{width:18px;height:18px;color:rgba(255,255,255,0.5);flex-shrink:0}
.hero-search-placeholder{font-size:15px;color:rgba(255,255,255,0.45);flex:1;text-align:left}
.hero-search-kbd{font-size:11px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);
  border-radius:4px;padding:2px 7px;font-family:monospace}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.search-overlay.open{display:flex}
.search-modal{width:100%;max-width:760px;background:#fff;border-radius:20px;
  box-shadow:0 32px 80px rgba(0,0,0,.4);overflow:hidden;
  max-height:calc(100vh - 120px);display:flex;flex-direction:column}
.search-input-row{display:flex;align-items:center;gap:0;padding:0 20px;
  border-bottom:1px solid rgba(0,0,0,0.08)}
.search-input-row svg{width:20px;height:20px;color:var(--mid);flex-shrink:0}
.search-input-row input{flex:1;border:none;outline:none;font-size:18px;font-family:inherit;
  padding:20px 14px;color:var(--black);background:transparent}
.search-input-row input::placeholder{color:var(--light)}
.search-close-btn{background:none;border:none;cursor:pointer;padding:8px;
  font-size:16px;color:var(--mid);border-radius:8px;transition:background var(--t)}
.search-close-btn:hover{background:rgba(0,0,0,0.06)}
.search-filters-row{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap;
  border-bottom:1px solid rgba(0,0,0,0.06);background:#fafafa}
.search-filter-select{border:1px solid var(--light);border-radius:980px;padding:5px 12px;
  font-size:12px;font-weight:500;font-family:inherit;color:var(--black);
  background:#fff;cursor:pointer;outline:none;transition:border-color var(--t)}
.search-filter-select:focus{border-color:var(--blue)}
.search-results-area{overflow-y:auto;flex:1;padding:8px 0}
.search-result-item{display:flex;align-items:center;gap:14px;padding:12px 20px;
  cursor:pointer;transition:background var(--t)}
.search-result-item:hover{background:rgba(0,0,0,0.04)}
.search-result-thumb{width:64px;height:40px;border-radius:6px;overflow:hidden;
  background:#1a1a2e;flex-shrink:0}
.search-result-thumb img{width:100%;height:100%;object-fit:cover}
.search-result-thumb-ph{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:18px}
.search-result-info{flex:1;min-width:0}
.search-result-title{font-size:14px;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.search-result-meta{font-size:12px;color:var(--mid);margin-top:2px}
.search-result-medal{flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;padding:3px 8px;border-radius:100px}
.search-empty{padding:40px 20px;text-align:center;color:var(--mid);font-size:14px}
.search-count{font-size:11px;color:var(--mid);padding:10px 20px 2px;
  font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ===== TRACK SECTION (home) ===== */
.track-section{padding:56px 0;border-bottom:1px solid rgba(0,0,0,0.07)}
.track-section:last-of-type{border-bottom:none}
.track-inner{max-width:1280px;margin:0 auto;padding:0 24px}
.track-label{font-size:22px;font-weight:700;color:var(--blue);margin-bottom:32px;
  letter-spacing:-.4px}

/* CATEGORY BLOCKS (home) */
.cat-block{margin-bottom:52px}
.cat-block:last-child{margin-bottom:0}
.cat-block-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;padding-bottom:12px;
  border-bottom:1px solid rgba(0,0,0,0.07)}
.cat-block-name{display:flex;align-items:center;gap:10px}
.cat-block-icon{font-size:24px}
.cat-block-title{font-size:19px;font-weight:700;letter-spacing:-.3px}
.cat-block-link{font-size:13px;color:var(--blue);text-decoration:none;font-weight:500;
  display:flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer}
.cat-block-link:hover{text-decoration:underline}

/* TWO-COL LAYOUT inside cat-block */
.cat-block-body{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:stretch}
.cat-block-body.multi-gp{grid-template-columns:1fr 280px}
.cat-gp-col{min-width:0;display:flex;flex-direction:column}
.cat-gp-grid{display:grid;grid-template-columns:1fr;gap:14px;flex:1}
.cat-gp-grid .win-card{max-height:100%;overflow:hidden}
.cat-gp-grid:not(.multi) .win-card{height:100%}
.cat-gp-grid:not(.multi) .win-thumb{max-height:260px}
.cat-gp-grid.multi{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.cat-medals-col{background:#fff;border-radius:16px;box-shadow:var(--shadow);
  overflow:hidden;border:1px solid rgba(0,0,0,0.05)}
.cat-medals-col-header{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--mid);padding:14px 16px 10px;
  border-bottom:1px solid rgba(0,0,0,0.06);background:#fafafa}
.mi-group{padding:10px 0 4px}
.mi-group-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;padding:4px 16px 6px}
.mi-row{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;
  transition:background var(--t)}
.mi-row:hover{background:rgba(0,113,227,0.05)}
.mi-thumb{width:36px;height:24px;border-radius:4px;overflow:hidden;flex-shrink:0;
  background:#1a1a2e}
.mi-thumb img{width:100%;height:100%;object-fit:cover}
.mi-thumb-ph{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:12px}
.mi-info{min-width:0}
.mi-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;color:var(--black)}
.mi-brand{font-size:11px;color:var(--mid);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.mi-more{font-size:11px;color:var(--blue);padding:6px 16px 12px;cursor:pointer}
.mi-more:hover{text-decoration:underline}

@media(max-width:900px){
  .cat-block-body{grid-template-columns:1fr;align-items:start}
  .cat-block-body.multi-gp{grid-template-columns:1fr}
  .cat-gp-col{display:block}
  .cat-gp-grid{flex:none}
  .cat-gp-grid:not(.multi) .win-card{height:auto}
  .cat-gp-grid:not(.multi) .win-thumb{max-height:none}
  .cat-medals-col{margin-top:16px}
  /* Multi-GP (es. Film Lions con 2 GP): su mobile collassa a 1 colonna */
  .cat-gp-grid.multi{grid-template-columns:1fr}
}
@media(max-width:768px){
  .hero-stats{gap:24px}.stat-num{font-size:28px}
  .cat-block-body.multi-gp{grid-template-columns:1fr}
  .cat-gp-grid{grid-template-columns:1fr}
  .cat-gp-grid.multi{grid-template-columns:1fr}
  .lucky-info-bar{flex-direction:column}
  .search-modal{border-radius:0;max-height:100vh}
  .search-overlay{padding-top:0;align-items:flex-start}
  /* Case page mobile */
  .case-body{padding:32px 16px 60px}
  .case-info-bar{gap:16px}
  .credits-table td:first-child{width:100px}
}

/* WIN CARDS (shared) */
.win-card{background:#fff;border-radius:var(--r);overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);transition:transform var(--t),box-shadow var(--t);
  display:flex;flex-direction:column}
.win-card:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,0.14)}
.win-thumb{position:relative;width:100%;padding-bottom:56.25%;background:#111;overflow:hidden;flex-shrink:0}
.win-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .5s ease}
.win-card:hover .win-thumb img{transform:scale(1.05)}
.win-thumb-placeholder{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:52px;
  background:linear-gradient(135deg,#1a1a2e 0%,#0d3b5e 100%)}
.win-play{position:absolute;bottom:12px;right:12px;width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center}
.win-play svg{fill:#fff;width:14px;height:14px;margin-left:2px}
.win-body{padding:20px;display:flex;flex-direction:column;flex:1}
.win-medal{display:inline-flex;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;padding:0 12px;height:28px;border-radius:100px;margin-bottom:10px;align-self:flex-start;line-height:1}
.case-meta-top .win-medal{align-self:center;margin-bottom:0}
.wm-gp{background:var(--gp-grad);color:#000}
.wm-gold{background:linear-gradient(135deg,#FFD700,#FFB300);color:#000}
.wm-silver{background:linear-gradient(135deg,#E8E8E8,#A0A0A0);color:#333}
.wm-bronze{background:linear-gradient(135deg,#CD7F32,#8D6E63);color:#fff}
.win-title{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.25;margin-bottom:4px}
.win-brand{font-size:13px;color:var(--mid);font-weight:500;margin-bottom:2px}
.win-agency{font-size:12px;color:var(--light);margin-bottom:8px}
.win-excerpt{font-size:13px;color:#515154;line-height:1.55;margin-bottom:12px;flex:1}
.win-cta{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
  color:var(--blue);background:rgba(0,113,227,0.08);border-radius:980px;
  padding:7px 16px;margin-top:auto;align-self:flex-start;border:none;cursor:pointer;
  font-family:inherit;transition:background var(--t),transform var(--t)}
.win-cta:hover{background:rgba(0,113,227,0.15);transform:translateX(2px)}
.win-cta svg{width:14px;height:14px;flex-shrink:0}

/* MEDAL SECTIONS (category page) */
.medal-section{max-width:1280px;margin:0 auto;padding:48px 24px}
.medal-label-pill{display:inline-flex;align-items:center;gap:8px;border-radius:100px;
  padding:6px 18px;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:20px}
.ml-gp{background:var(--gp-grad);color:#000}
.ml-gold{background:linear-gradient(135deg,#FFD700,#FFB300);color:#000}
.ml-silver{background:linear-gradient(135deg,#E8E8E8,#9E9E9E);color:#333}
.ml-bronze{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.medal-section h2{font-size:clamp(20px,2.8vw,30px);font-weight:700;letter-spacing:-.5px;margin-bottom:28px}
.win-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.win-grid.full-width .win-card:first-child:last-child{max-width:680px}
.divider{height:1px;background:rgba(0,0,0,0.07);max-width:1280px;margin:0 auto}

/* CATEGORY PAGE HERO */
.cat-hero{background:#000;color:#fff;padding:72px 24px 56px;text-align:center}
.cat-hero-inner{max-width:800px;margin:0 auto}
.cat-hero-icon{font-size:52px;margin-bottom:16px;display:block}
.cat-hero h1{font-size:clamp(32px,5.5vw,68px);font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:14px}
.cat-hero-sub{font-size:17px;color:rgba(255,255,255,0.5);margin-bottom:24px}
.cat-hero-stats{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.cat-stat-n{font-size:26px;font-weight:700;color:#fff;letter-spacing:-1px}
.cat-stat-l{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* CASE STUDY PAGE */
.case-video-wrap{width:100%;background:#000}
.case-video-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.case-img-hero{width:100%;max-height:560px;object-fit:cover;display:block}
.case-body{max-width:900px;margin:0 auto;padding:52px 24px 80px}
.case-meta-top{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.case-cat-tag{display:inline-flex;align-items:center;font-size:11px;color:var(--mid);background:rgba(0,0,0,0.06);
  border-radius:100px;padding:0 12px;height:28px;font-weight:500;cursor:pointer;line-height:1}
.case-cat-tag:hover{background:rgba(0,113,227,0.1);color:var(--blue)}
.case-title{font-size:clamp(26px,5vw,52px);font-weight:700;letter-spacing:-1.5px;
  line-height:1.05;margin-bottom:10px}
.case-tagline{font-size:17px;color:var(--mid);margin-bottom:30px}
.case-info-bar{display:flex;gap:28px;padding:22px 0;
  border-top:1px solid rgba(0,0,0,0.08);border-bottom:1px solid rgba(0,0,0,0.08);
  margin-bottom:36px;flex-wrap:wrap}
.case-info-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--mid);font-weight:600;margin-bottom:4px}
.case-info-value{font-size:14px;font-weight:600;letter-spacing:-.2px}
.case-description{font-size:17px;line-height:1.72;color:#3a3a3c;margin-bottom:36px}
.case-description p{margin-bottom:16px}
.video-embed{border-radius:var(--r);overflow:hidden;background:#000;margin-bottom:36px}
.video-embed iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.credits-table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;
  border:1px solid rgba(0,0,0,0.08);margin-bottom:36px}
.credits-table tr:last-child td{border-bottom:none}
.credits-table td{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:14px}
.credits-table td:first-child{font-size:11px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--mid);font-weight:700;background:#f9f9fb;width:140px}
.related-section{margin-top:52px;padding-top:36px;border-top:1px solid rgba(0,0,0,0.08)}
.related-section h3{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:20px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.related-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);transition:transform var(--t)}
.related-card:hover{transform:translateY(-3px)}
.related-thumb{width:100%;padding-bottom:56.25%;position:relative;background:#1a1a2e}
.related-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.related-thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.related-body{padding:12px}
.related-title{font-size:13px;font-weight:600;margin-bottom:2px}
.related-brand{font-size:11px;color:var(--mid)}

/* SPECIAL AWARDS */
.special-section{background:#1d1d1f;color:#fff;padding:64px 24px}
.special-inner{max-width:1280px;margin:0 auto}
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:24px}
.special-card{background:#2c2c2e;border-radius:var(--r);padding:22px}
.special-rank{font-size:30px;font-weight:700;color:var(--gold);letter-spacing:-1px;margin-bottom:4px}
.special-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.special-label{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.8px}

/* TRACK BADGE */
.track-badge{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;padding:3px 10px;border-radius:100px}
.tb-classic{background:#e8f0fe;color:#1a73e8}
.tb-craft{background:#fce8e6;color:#d93025}
.tb-entertainment{background:#fff3e0;color:#e65100}
.tb-experience{background:#e8f5e9;color:#2e7d32}
.tb-strategy{background:#f3e8fd;color:#6a1b9a}
.tb-engagement{background:#e3f2fd;color:#0d47a1}
.tb-good{background:#f1f8e9;color:#33691e}
.tb-design{background:#fbe9e7;color:#bf360c}
.tb-innovation{background:#e0f7fa;color:#006064}
.tb-brand{background:#fdf1f8;color:#880e4f}
.tb-titanium{background:#263238;color:#fff}

/* ===== LUCKY PAGE ===== */
.lucky-page{position:relative;min-height:100vh;background:#000;overflow:hidden;
  display:flex;flex-direction:column}
.lucky-stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.lucky-stars span{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--del,0s) infinite alternate}
@keyframes twinkle{0%{opacity:.1;transform:scale(.8)}100%{opacity:.9;transform:scale(1.2)}}

{id:'soil-stay-b2b',cat:'b2b',medal:'gold',title:'SOIL STAY',brand:'TRA MONGKUT FERTILIZER',agency:'VML',country:'🇹🇭 Thailand',video:null,thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/5a33087a315e465ba5f4069becca2b08/storyboard_000008.jpg',description:'<p><strong>SOIL STAY</strong> — <strong>Gold Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Creative B2B Lions</strong>.</p><p>Sviluppato da <strong>VML</strong> per <strong>TRA MONGKUT FERTILIZER</strong> (Thailand), è una campagna B2B che dimostra che la creatività funziona anche quando il pubblico è professionale. Tra i lavori più riconosciuti dell\'anno al festival di Cannes.</p>',credits:[['Brand','TRA MONGKUT FERTILIZER'],['Agenzia','VML'],['Paese','Thailand'],['Categoria','Creative B2B Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'tocayos-b2b',cat:'b2b',medal:'gold',title:'TOCAYOS',brand:'HEINEKEN',agency:'LEPUB',country:'🇮🇹 Italy',video:{type:'youtube',id:'VC_-2RzivYI'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/dab9c362b0f54c98988d19bcab03eb27/storyboard_000008.jpg',description:'<p>Heineken cerca e trova tutte le persone nel mondo che si chiamano Heineken (i "tocayos" — omonimi in spagnolo) e le trasforma in testimonial autentici. Una strategia creativa brillante che usa la coincidenza del nome come media. Grand Prix Creative Strategy Lions 2026, agenzia LePub.</p><p class="credits-line">📍 LEPUB per HEINEKEN, Italy.</p>',credits:[['Brand','HEINEKEN'],['Agenzia','LEPUB'],['Paese','Italy'],['Categoria','Creative B2B Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'keep-thinking-b2b',cat:'b2b',medal:'silver',title:'KEEP THINKING',brand:'CLAUDE',agency:'MOTHER',country:'🇬🇧 United Kingdom',video:{type:'youtube',id:'obIfySYqtkE'},thumb:'https://img.youtube.com/vi/obIfySYqtkE/hqdefault.jpg',description:'<p>La prima campagna pubblicitaria di Anthropic per Claude. In un mondo di spot AI che promettono tutto e non mostrano nulla, Mother London sceglie l\'opposto: immagini potenti, MF Doom in colonna sonora, e un messaggio semplice — Claude amplifica il tuo pensiero, non lo sostituisce.</p><p>"Keep Thinking" è il posizionamento di Claude come AI per chi vuole ancora pensare con la propria testa. Silver Lion Creative B2B 2026.</p><p class="credits-line">📍 MOTHER per CLAUDE, United Kingdom.</p>',credits:[['Brand','CLAUDE'],['Agenzia','MOTHER'],['Paese','United Kingdom'],['Categoria','Creative B2B Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'reverse-media-schedule-b2b',cat:'b2b',medal:'silver',title:'REVERSE MEDIA SCHEDULE',brand:'SEA CLEANERS & JCDECAUX',agency:'DENTSU CREATIVE',country:'🇳🇿 New Zealand',video:null,thumb:'',description:'<p><strong>REVERSE MEDIA SCHEDULE</strong> riceve il <strong>Silver Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Creative B2B Lions</strong>.</p><p>DENTSU CREATIVE firma questo lavoro per <strong>SEA CLEANERS & JCDECAUX</strong> (New Zealand): una campagna B2B che dimostra che la creatività funziona anche quando il pubblico è professionale e si guadagna un posto tra le eccellenze creative globali dell\'anno.</p>',credits:[['Brand','SEA CLEANERS & JCDECAUX'],['Agenzia','DENTSU CREATIVE'],['Paese','New Zealand'],['Categoria','Creative B2B Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'the-trojan-fax-b2b',cat:'b2b',medal:'silver',title:'THE TROJAN FAX',brand:'IUCN FRENCH COMMITTEE X FUJIFILM PRINT',agency:'BETC',country:'🇫🇷 France',video:{type:'youtube',id:'A0woVn-zQuU'},thumb:'https://img.youtube.com/vi/A0woVn-zQuU/hqdefault.jpg',description:'<p>I governi locali francesi ignorano sistematicamente i report ambientali dell\'IUCN. BETC Paris e Fujifilm trovano la soluzione: stampare i dati sulle specie in via di estinzione direttamente sulle cartucce dei fax dei ministeri. I report arrivano comunque — stampati dall\'interno. "The Trojan Fax" è craft, strategia e attivismo in un unico oggetto fisico. Gold Lion Print & Publishing e Silver Lion Outdoor 2026.</p><p class="credits-line">📍 BETC per IUCN FRENCH COMMITTEE X FUJIFILM PRINT, France.</p>',credits:[['Brand','IUCN FRENCH COMMITTEE X FUJIFILM PRINT'],['Agenzia','BETC'],['Paese','France'],['Categoria','Creative B2B Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'vaseline-originals-b2b',cat:'b2b',medal:'silver',title:'VASELINE ORIGINALS',brand:'VASELINE',agency:'OGILVY SINGAPORE',country:'🇸🇬 Singapore',video:{type:'youtube',id:'hzq9lR5SsNo'},thumb:'https://img.youtube.com/vi/hzq9lR5SsNo/hqdefault.jpg',description:'<p>Vaseline ha ispirato milioni di beauty hack online per decenni. Ogilvy Singapore fa l\'unica cosa giusta: rintraccia i creator originali — quelli che nel 2008 inventarono i hack prima che diventassero virali — e trasforma le loro idee in prodotti ufficiali, condividendo con loro il successo commerciale.</p><p>Vaseline Brow Tamer e All-In-One Primer & Highlighter Jelly sold out in meno di un minuto al loro debutto TikTok Live. Un nuovo modello per fare prodotti: Silver Lion Creative B2B e Social & Creator, Cannes Lions 2026.</p><p class="credits-line">📍 OGILVY SINGAPORE per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','OGILVY SINGAPORE'],['Paese','Singapore'],['Categoria','Creative B2B Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'cif-clean-my-name-commerce',cat:'commerce',medal:'bronze',title:'CIF CLEAN MY NAME',brand:'CIF',agency:'DROGA5',country:'🇧🇷 Brazil',video:{type:'youtube',id:'YEY9mseQ6hQ'},thumb:'https://img.youtube.com/vi/YEY9mseQ6hQ/hqdefault.jpg',description:'<p>In Brasile, milioni di persone hanno il nome segnalato come insolvente nel database Serasa — una macchia che blocca lavoro, credito e futuro. Cif, il detergente che pulisce tutto, si offre di "pulire il nome" di chi ne ha bisogno. Partnership creativa con Serasa, Gold Lion Experience 2026.</p><p class="credits-line">📍 DROGA5 per CIF, Brazil.</p>',credits:[['Brand','CIF'],['Agenzia','DROGA5'],['Paese','Brazil'],['Categoria','Creative Commerce Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'resize-the-price-commerce',cat:'commerce',medal:'bronze',title:'RESIZE THE PRICE',brand:'AGUILA',agency:'DAVID',country:'🇨🇴 Colombia',video:{type:'youtube',id:'Xm7k9xRyXw4'},thumb:'https://img.youtube.com/vi/Xm7k9xRyXw4/hqdefault.jpg',description:'<p>Le maglie della nazionale colombiana costano sempre di più, mettendo il kit ufficiale fuori portata per molti tifosi. Aguila Beer e DAVID Bogotá trovano la soluzione: più grande è il logo Aguila sulla maglia, più basso è il prezzo. Un accordo con la federazione che fa dell\'advertising il meccanismo di pricing. Gold Lion Entertainment Lions for Sport 2026.</p><p class="credits-line">📍 DAVID per AGUILA, Colombia.</p>',credits:[['Brand','AGUILA'],['Agenzia','DAVID'],['Paese','Colombia'],['Categoria','Creative Commerce Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'the-period-uniform-commerce',cat:'commerce',medal:'bronze',title:'THE PERIOD UNIFORM',brand:'SOMOS MARTINA',agency:'SERVICEPLAN GERMANY',country:'🇩🇪 Germany',video:{type:'youtube',id:'HyMUBXfNT4g'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/3130427443a3470bb87e53d95c4953f2/storyboard_000008.jpg',description:'<p><strong>THE PERIOD UNIFORM</strong> ottiene il <strong>Bronze Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Creative Commerce Lions</strong>.</p><p>Creato da <strong>SERVICEPLAN GERMANY</strong> per <strong>SOMOS MARTINA</strong> (Germany), è un progetto di commerce creativo che ha trovato nuovi modi per avvicinare brand e acquisto — riconosciuto dalla giuria internazionale di Cannes tra i lavori dell\'anno.</p>',credits:[['Brand','SOMOS MARTINA'],['Agenzia','SERVICEPLAN GERMANY'],['Paese','Germany'],['Categoria','Creative Commerce Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'vaseline-originals-commerce',cat:'commerce',medal:'bronze',title:'VASELINE ORIGINALS',brand:'VASELINE',agency:'OGILVY SINGAPORE',country:'🇸🇬 Singapore',video:{type:'youtube',id:'hzq9lR5SsNo'},thumb:'https://img.youtube.com/vi/hzq9lR5SsNo/hqdefault.jpg',description:'<p>Vaseline ha ispirato milioni di beauty hack online per decenni. Ogilvy Singapore fa l\'unica cosa giusta: rintraccia i creator originali — quelli che nel 2008 inventarono i hack prima che diventassero virali — e trasforma le loro idee in prodotti ufficiali, condividendo con loro il successo commerciale.</p><p>Vaseline Brow Tamer e All-In-One Primer & Highlighter Jelly sold out in meno di un minuto al loro debutto TikTok Live. Un nuovo modello per fare prodotti: Silver Lion Creative B2B e Social & Creator, Cannes Lions 2026.</p><p class="credits-line">📍 OGILVY SINGAPORE per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','OGILVY SINGAPORE'],['Paese','Singapore'],['Categoria','Creative Commerce Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'sos-pos-data',cat:'data',medal:'grandprix',title:'SOS POS',brand:'BCP',agency:'CIRCUS GREY',country:'🇵🇪 Peru',video:{type:'youtube',id:'pvbns94Ti2g'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/b13ea085ad9a4830988f7a582a7e7016/storyboard_000008.jpg',description:'<p>In Perù vengono rubati oltre 4.000 cellulari al giorno. Banco de Crédito BCP trasforma i POS (i terminali di pagamento) in un sistema di allerta anti-furto in tempo reale: ogni negoziante può segnalare una rapina con un tap. Dati, comportamento e design al servizio della sicurezza urbana. Grand Prix Creative Data Lions 2026.</p><p class="credits-line">📍 CIRCUS GREY per BCP, Peru.</p>',credits:[['Brand','BCP'],['Agenzia','CIRCUS GREY'],['Paese','Peru'],['Categoria','Creative Data Lions'],['Medaglia','Grand Prix'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'600k-network-data',cat:'data',medal:'gold',title:'600K NETWORK',brand:'COMANDO CON VENEZUELA',agency:'RAINBOW LOBSTER',country:'🇲🇽 Mexico',video:{type:'youtube',id:'egeVlZsJZfc'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/022f9b1a2947470683a94f113b0b7bee/storyboard_000008.jpg',description:'<p><strong>600K NETWORK</strong> — <strong>Gold Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Creative Data Lions</strong>.</p><p>Sviluppato da <strong>RAINBOW LOBSTER</strong> per <strong>COMANDO CON VENEZUELA</strong> (Mexico), è una campagna data-driven che trasforma dati in comportamenti e dati in storie. Tra i lavori più riconosciuti dell\'anno al festival di Cannes.</p>',credits:[['Brand','COMANDO CON VENEZUELA'],['Agenzia','RAINBOW LOBSTER'],['Paese','Mexico'],['Categoria','Creative Data Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'duobell-data',cat:'data',medal:'silver',title:'DUOBELL',brand:'SKODA',agency:'ABBOTT MEAD VICKERS BBDO',country:'🇬🇧 United Kingdom',video:{type:'vimeo',id:'1201785202'},thumb:'https://vumbnail.com/1201785202.jpg',description:'<p>Le cuffie noise-cancelling proteggono così bene dai rumori che i ciclisti non sentono più i campanelli delle bici. Škoda e AMV BBDO trovano la soluzione: DuoBell, un campanello meccanico che sfrutta una "safety gap" acustica tra 750 e 780 Hz — l\'unica frequenza che attraversa i filtri ANC. Testato con rider Deliveroo. Prototipato da Unit9. Silver Lion Innovation 2026.</p><p class="credits-line">📍 ABBOTT MEAD VICKERS BBDO per SKODA, United Kingdom.</p>',credits:[['Brand','SKODA'],['Agenzia','ABBOTT MEAD VICKERS BBDO'],['Paese','United Kingdom'],['Categoria','Creative Data Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'haven-data',cat:'data',medal:'silver',title:'HAVEN',brand:'SUNCORP INSURANCE',agency:'LEO AUSTRALIA',country:'🇦🇺 Australia',video:{type:'youtube',id:'Tyn4jC4QP9c'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/bae3b7c950b74900b10125d97e06ff88/storyboard_000008.jpg',description:'<p>Una piattaforma tecnologica per proteggere le persone in situazioni di violenza domestica — con strumenti di sicurezza discreti, accessibili e pensati per chi non può chiedere aiuto apertamente. Design al servizio delle persone più vulnerabili. Grand Prix Dan Wieden Titanium Lions 2026.</p><p class="credits-line">📍 LEO AUSTRALIA per SUNCORP INSURANCE, Australia.</p>',credits:[['Brand','SUNCORP INSURANCE'],['Agenzia','LEO AUSTRALIA'],['Paese','Australia'],['Categoria','Creative Data Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'lucky-fan-index-data',cat:'data',medal:'silver',title:'LUCKY FAN INDEX',brand:'WISLA KRAKOW FOOTBALL CLUB',agency:'VML',country:'🇵🇱 Poland',video:{type:'youtube',id:'EZNQm5UxyMQ'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/9c9af7242b7f4f90a2db1ee397004d29/storyboard_000008.jpg',description:'<p>Ogni tifoso crede di portare fortuna alla sua squadra. Il Lucky Fan Index di Wisła Kraków (Polonia) lo misura davvero — analizzando le partite, la presenza, i gesti scaramantici — e trasforma la superstizione in un sistema di engagement irresistibile. Grand Prix Creative Commerce Lions 2026.</p><p class="credits-line">📍 VML per WISLA KRAKOW FOOTBALL CLUB, Poland.</p>',credits:[['Brand','WISLA KRAKOW FOOTBALL CLUB'],['Agenzia','VML'],['Paese','Poland'],['Categoria','Creative Data Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'apple-tv-rebrand-design',cat:'design',medal:'grandprix',title:'APPLE TV REBRAND',brand:'APPLE',agency:'TBWA\MEDIA ARTS LAB',country:'🇺🇸 United States',video:{type:'youtube',id:'D-qihLXAzog'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/03dca9a76e6c4426a9da523720478d45/storyboard_000008.jpg',description:'<p>Apple reinventa l\'identità visiva di Apple TV+ con un sistema di design fluido e in continua evoluzione — dove il logo si adatta ai contenuti, ai momenti, alle emozioni. Un\'identità viva, non statica. Grand Prix Design Lions 2026.</p><p class="credits-line">📍 TBWA\MEDIA ARTS LAB per APPLE, United States.</p>',credits:[['Brand','APPLE'],['Agenzia','TBWA\MEDIA ARTS LAB'],['Paese','United States'],['Categoria','Design Lions'],['Medaglia','Grand Prix'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'project-genie-digitalcraft',cat:'digitalcraft',medal:'grandprix',title:'PROJECT GENIE',brand:'GOOGLE',agency:'GOOGLE',country:'🇺🇸 United States',video:{type:'youtube',id:'D448m_QWf74'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/59f9d7258a024e5888ef333ed6b64256/storyboard_000008.jpg',description:'<p>Google DeepMind presenta Project Genie: una AI che trasforma un singolo video in un mondo 3D interattivo e giocabile. Un passo rivoluzionario nella generazione di ambienti virtuali da input visivi semplici. Grand Prix Digital Craft Lions 2026.</p><p class="credits-line">📍 GOOGLE per GOOGLE, United States.</p>',credits:[['Brand','GOOGLE'],['Agenzia','GOOGLE'],['Paese','United States'],['Categoria','Digital Craft Lions'],['Medaglia','Grand Prix'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'language-of-bedwetting-digitalcraft',cat:'digitalcraft',medal:'gold',title:'LANGUAGE OF BEDWETTING',brand:'AUTISM SOCIETY',agency:'McCANN NEW YORK',country:'🇺🇸 United States',video:{type:'youtube',id:'v6al3u5d4Fo'},thumb:'https://img.youtube.com/vi/v6al3u5d4Fo/hqdefault.jpg',description:'<p>Per molti bambini autistici non verbali, bagnare il letto è una delle poche forme di comunicazione disponibili — ma non esiste ancora un linguaggio per decodificarla. Autism Society crea uno strumento per aiutare le famiglie a capire i segnali. Gold Lion Digital Craft 2026.</p><p class="credits-line">📍 McCANN NEW YORK per AUTISM SOCIETY, United States.</p>',credits:[['Brand','AUTISM SOCIETY'],['Agenzia','McCANN NEW YORK'],['Paese','United States'],['Categoria','Digital Craft Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'sos-pos-digitalcraft',cat:'digitalcraft',medal:'gold',title:'SOS POS',brand:'BCP',agency:'CIRCUS GREY',country:'🇵🇪 Peru',video:{type:'youtube',id:'pvbns94Ti2g'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/b13ea085ad9a4830988f7a582a7e7016/storyboard_000008.jpg',description:'<p>In Perù vengono rubati oltre 4.000 cellulari al giorno. Banco de Crédito BCP trasforma i POS (i terminali di pagamento) in un sistema di allerta anti-furto in tempo reale: ogni negoziante può segnalare una rapina con un tap. Dati, comportamento e design al servizio della sicurezza urbana. Grand Prix Creative Data Lions 2026.</p><p class="credits-line">📍 CIRCUS GREY per BCP, Peru.</p>',credits:[['Brand','BCP'],['Agenzia','CIRCUS GREY'],['Paese','Peru'],['Categoria','Digital Craft Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'one-more-question-direct',cat:'direct',medal:'silver',title:'ONE MORE QUESTION',brand:'LALCEC',agency:'GREY ARGENTINA',country:'🇦🇷 Argentina',video:{type:'youtube',id:'CV7KcrlJwk8'},thumb:'https://img.youtube.com/vi/CV7KcrlJwk8/hqdefault.jpg',description:'<p>Il 40% dei tumori alla prostata in Argentina viene diagnosticato in stadio avanzato perché gli uomini non si controllano. Grey Argentina e LALCEC infiltrano conferenze stampa, interviste sportive e dibattiti politici: giornalisti e conduttori pongono "una domanda in più" — "Ti sei fatto il controllo annuale della prostata?" I risultati: +31% di visite mediche per prevenzione. Gold Lion PR 2026.</p><p class="credits-line">📍 GREY ARGENTINA per LALCEC, Argentina.</p>',credits:[['Brand','LALCEC'],['Agenzia','GREY ARGENTINA'],['Paese','Argentina'],['Categoria','Direct Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'vaseline-originals-direct',cat:'direct',medal:'bronze',title:'VASELINE ORIGINALS',brand:'VASELINE',agency:'OGILVY SINGAPORE',country:'🇸🇬 Singapore',video:{type:'youtube',id:'hzq9lR5SsNo'},thumb:'https://img.youtube.com/vi/hzq9lR5SsNo/hqdefault.jpg',description:'<p>Vaseline ha ispirato milioni di beauty hack online per decenni. Ogilvy Singapore fa l\'unica cosa giusta: rintraccia i creator originali — quelli che nel 2008 inventarono i hack prima che diventassero virali — e trasforma le loro idee in prodotti ufficiali, condividendo con loro il successo commerciale.</p><p>Vaseline Brow Tamer e All-In-One Primer & Highlighter Jelly sold out in meno di un minuto al loro debutto TikTok Live. Un nuovo modello per fare prodotti: Silver Lion Creative B2B e Social & Creator, Cannes Lions 2026.</p><p class="credits-line">📍 OGILVY SINGAPORE per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','OGILVY SINGAPORE'],['Paese','Singapore'],['Categoria','Direct Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'three-words-effectiveness',cat:'effectiveness',medal:'gold',title:'THREE WORDS',brand:'AXA FRANCE',agency:'PUBLICIS CONSEIL',country:'🇫🇷 France',video:{type:'youtube',id:'pY-03zuV7mE'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/aaf928273494421bbeda43ac55389efe/storyboard_000008.jpg',description:'<p>Tre parole che cambiano tutto. AXA e la campagna che dimostra come la comunicazione semplice, diretta e umana sia più efficace di qualsiasi sofisticazione tecnica. Grand Prix Creative Effectiveness Lions 2026.</p><p class="credits-line">📍 PUBLICIS CONSEIL per AXA FRANCE, France.</p>',credits:[['Brand','AXA FRANCE'],['Agenzia','PUBLICIS CONSEIL'],['Paese','France'],['Categoria','Creative Effectiveness Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'football-is-for-food-effectiveness',cat:'effectiveness',medal:'silver',title:'FOOTBALL IS FOR FOOD',brand:'UBER EATS',agency:'SPECIAL',country:'🇺🇸 United States',video:{type:'youtube',id:'81ahl1QYMp0'},thumb:'https://img.youtube.com/vi/81ahl1QYMp0/hqdefault.jpg',description:'<p>Teoria del complotto: il football americano è stato inventato per vendere cibo. McConaughey ci crede da anni. Per il Super Bowl LX 2026, Bradley Cooper tenta disperatamente di smontare la teoria — senza riuscirci. Über Eats porta la piattaforma "Football is for Food" al suo apice con uno spot interattivo dove ogni spettatore costruisce la propria versione dell\'ad. Grand Effie 2026, Silver Lion Creative Effectiveness Cannes 2026.</p><p class="credits-line">📍 SPECIAL per UBER EATS, United States.</p>',credits:[['Brand','UBER EATS'],['Agenzia','SPECIAL'],['Paese','United States'],['Categoria','Creative Effectiveness Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'ikea-hidden-tags-effectiveness',cat:'effectiveness',medal:'silver',title:'IKEA HIDDEN TAGS',brand:'IKEA',agency:'UZINA',country:'🇵🇹 Portugal',video:{type:'youtube',id:'oKWkHqlt7yA'},thumb:'https://img.youtube.com/vi/oKWkHqlt7yA/hqdefault.jpg',description:'<p>IKEA ha una reputazione di mobili che durano per decenni. Per dimostrarlo, nasconde tag speciali dentro i mobili venduti anni prima — con un codice per richiedere il pezzo di ricambio gratuito. Chi trova il tag, ottiene la riparazione. Un\'idea che dimostra la qualità invece di affermarla. Silver Lion Creative Effectiveness 2026, agenzia Uzina.</p><p class="credits-line">📍 UZINA per IKEA, Portugal.</p>',credits:[['Brand','IKEA'],['Agenzia','UZINA'],['Paese','Portugal'],['Categoria','Creative Effectiveness Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'expedition-impossible-experience',cat:'experience',medal:'grandprix',title:'EXPEDITION IMPOSSIBLE',brand:'COLUMBIA SPORTSWEAR',agency:'adam&eve\TBWA',country:'🇬🇧 United Kingdom',video:{type:'youtube',id:'N0WxAUkBuQA'},thumb:'https://img.youtube.com/vi/N0WxAUkBuQA/hqdefault.jpg',description:'<p>Columbia Sportswear sfida i suoi atleti e i suoi clienti a fare l\'impossibile: attraversare terreni estremi, testare i limiti del corpo e dell\'equipaggiamento. Un\'esperienza immersiva che diventa campagna globale. Grand Prix Brand Experience & Activation Lions 2026.</p><p class="credits-line">📍 adam&eve\TBWA per COLUMBIA SPORTSWEAR, United Kingdom.</p>',credits:[['Brand','COLUMBIA SPORTSWEAR'],['Agenzia','adam&eve\TBWA'],['Paese','United Kingdom'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Grand Prix'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'cif-clean-my-name-experience',cat:'experience',medal:'gold',title:'CIF CLEAN MY NAME',brand:'CIF',agency:'DROGA5',country:'🇧🇷 Brazil',video:{type:'youtube',id:'YEY9mseQ6hQ'},thumb:'https://img.youtube.com/vi/YEY9mseQ6hQ/hqdefault.jpg',description:'<p>In Brasile, milioni di persone hanno il nome segnalato come insolvente nel database Serasa — una macchia che blocca lavoro, credito e futuro. Cif, il detergente che pulisce tutto, si offre di "pulire il nome" di chi ne ha bisogno. Partnership creativa con Serasa, Gold Lion Experience 2026.</p><p class="credits-line">📍 DROGA5 per CIF, Brazil.</p>',credits:[['Brand','CIF'],['Agenzia','DROGA5'],['Paese','Brazil'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'could-have-been-a-heineken-experience',cat:'experience',medal:'gold',title:'COULD HAVE BEEN A HEINEKEN',brand:'HEINEKEN',agency:'LEPUB',country:'🇮🇹 Italy',video:{type:'youtube',id:'eLkUrAZxq80'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/0e23b7abc9db4ff989f39f5111ca0c5a/storyboard_000008.jpg',description:'<p>Qualsiasi momento in cui qualcuno beve qualcos\'altro è un\'occasione mancata per una Heineken. La campagna trasforma ogni birra della concorrenza in un involontario testimonial per Heineken. Freschissima, con una logica impossibile da contestare. Grand Prix Social & Creator Lions 2026.</p><p class="credits-line">📍 LEPUB per HEINEKEN, Italy.</p>',credits:[['Brand','HEINEKEN'],['Agenzia','LEPUB'],['Paese','Italy'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'expensive-sht-experience',cat:'experience',medal:'gold',title:'EXPENSIVE SH*T',brand:'HUGGIES',agency:'McCANN NEW YORK',country:'🇺🇸 United States',video:{type:'youtube',id:'Xhx4Xb6ytVo'},thumb:'https://img.youtube.com/vi/Xhx4Xb6ytVo/hqdefault.jpg',description:'<p>18 neonati. Quasi 500.000 dollari di oggetti di lusso. Huggies testa i suoi pannolini premium nel modo più drammatico possibile. Un\'idea brutale e brillante che diventa virale. Gold Lion Brand Experience 2026.</p><p class="credits-line">📍 McCANN NEW YORK per HUGGIES, United States.</p>',credits:[['Brand','HUGGIES'],['Agenzia','McCANN NEW YORK'],['Paese','United States'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'kyle-fcking-connor-experience',cat:'experience',medal:'gold',title:'KYLE F*CKING CONNOR',brand:'KFC CANADA',agency:'COURAGE',country:'🇨🇦 Canada',video:{type:'youtube',id:'bSL1iz37-Gg'},thumb:'https://img.youtube.com/vi/bSL1iz37-Gg/hqdefault.jpg',description:'<p>Kyle Connor è il capitano dei Winnipeg Jets e l\'idolo della città. I tifosi lo cantano con una canzone che ha come ritornello il suo nome seguito da una parolaccia. KFC Canada abbraccia il doppio senso e lancia "The Kyle F*cking Connor Meal" — branding involontario diventato campagna ufficiale. Gold Lion Experience 2026.</p><p class="credits-line">📍 COURAGE per KFC CANADA, Canada.</p>',credits:[['Brand','KFC CANADA'],['Agenzia','COURAGE'],['Paese','Canada'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'lucky-fan-index-experience',cat:'experience',medal:'gold',title:'LUCKY FAN INDEX',brand:'WISLA KRAKOW FOOTBALL CLUB',agency:'VML',country:'🇵🇱 Poland',video:{type:'youtube',id:'EZNQm5UxyMQ'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/9c9af7242b7f4f90a2db1ee397004d29/storyboard_000008.jpg',description:'<p>Ogni tifoso crede di portare fortuna alla sua squadra. Il Lucky Fan Index di Wisła Kraków (Polonia) lo misura davvero — analizzando le partite, la presenza, i gesti scaramantici — e trasforma la superstizione in un sistema di engagement irresistibile. Grand Prix Creative Commerce Lions 2026.</p><p class="credits-line">📍 VML per WISLA KRAKOW FOOTBALL CLUB, Poland.</p>',credits:[['Brand','WISLA KRAKOW FOOTBALL CLUB'],['Agenzia','VML'],['Paese','Poland'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'oreo-cows-experience',cat:'experience',medal:'gold',title:'OREO COWS',brand:'OREO',agency:'VML',country:'🇺🇸 United States',video:{type:'youtube',id:'V3mBzNrNEWk'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/47e4ef435b724925bbb2067ef8ec2853/storyboard_000008.jpg',description:'<p><strong>OREO COWS</strong> — <strong>Gold Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Brand Experience & Activation Lions</strong>.</p><p>Sviluppato da <strong>VML</strong> per <strong>OREO</strong> (United States), è un\'esperienza di brand activation che porta le persone dentro il brand, non solo davanti. Tra i lavori più riconosciuti dell\'anno al festival di Cannes.</p>',credits:[['Brand','OREO'],['Agenzia','VML'],['Paese','United States'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'sos-pos-experience',cat:'experience',medal:'gold',title:'SOS POS',brand:'BCP',agency:'CIRCUS GREY',country:'🇵🇪 Peru',video:{type:'youtube',id:'pvbns94Ti2g'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/b13ea085ad9a4830988f7a582a7e7016/storyboard_000008.jpg',description:'<p>In Perù vengono rubati oltre 4.000 cellulari al giorno. Banco de Crédito BCP trasforma i POS (i terminali di pagamento) in un sistema di allerta anti-furto in tempo reale: ogni negoziante può segnalare una rapina con un tap. Dati, comportamento e design al servizio della sicurezza urbana. Grand Prix Creative Data Lions 2026.</p><p class="credits-line">📍 CIRCUS GREY per BCP, Peru.</p>',credits:[['Brand','BCP'],['Agenzia','CIRCUS GREY'],['Paese','Peru'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'welcome-back-paisano-experience',cat:'experience',medal:'gold',title:'WELCOME BACK, PAISANO',brand:'TECATE',agency:'LEPUB',country:'🇲🇽 Mexico',video:{type:'youtube',id:'dhAvD_Thq8g'},thumb:'https://img.youtube.com/vi/dhAvD_Thq8g/hqdefault.jpg',description:'<p>Tecate accoglie i lavoratori migranti messicani che tornano a casa con un messaggio di dignità e appartenenza: "Bentornato, paesano." Una campagna che trasforma una birra in un simbolo di identità culturale e rispetto. Gold Lion Experience 2026.</p><p class="credits-line">📍 LEPUB per TECATE, Mexico.</p>',credits:[['Brand','TECATE'],['Agenzia','LEPUB'],['Paese','Mexico'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'vaseline-and-the-real-nigerian-prince-experience',cat:'experience',medal:'bronze',title:'VASELINE AND THE REAL NIGERIAN PRINCE',brand:'VASELINE',agency:'LEO',country:'🇸🇬 Singapore',video:{type:'vimeo',id:'1181772726'},thumb:'https://vumbnail.com/1181772726.jpg',description:'<p>I prodotti Vaseline contraffatti invadono il mercato nigeriano — difficili da distinguere dai veri, pericolosi per la pelle. Leo Singapore trova l\'insight perfetto: ogni nigeriano conosce la truffa del "principe nigeriano". Perché non usare un vero principe per combattere i falsi?</p><p>Prince Chris Okagbue dell\'Onitsha Kingdom diventa il volto della campagna e il "Vaseline Authenticator" — un tool su WhatsApp che consente di verificare in secondi l\'autenticità di ogni prodotto. Gold Lion Social & Creator 2026.</p><p class="credits-line">📍 LEO per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','LEO'],['Paese','Singapore'],['Categoria','Brand Experience & Activation Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'vaseline-and-the-real-nigerian-prince-media',cat:'media',medal:'bronze',title:'VASELINE AND THE REAL NIGERIAN PRINCE',brand:'VASELINE',agency:'LEO',country:'🇸🇬 Singapore',video:{type:'vimeo',id:'1181772726'},thumb:'https://vumbnail.com/1181772726.jpg',description:'<p>I prodotti Vaseline contraffatti invadono il mercato nigeriano — difficili da distinguere dai veri, pericolosi per la pelle. Leo Singapore trova l\'insight perfetto: ogni nigeriano conosce la truffa del "principe nigeriano". Perché non usare un vero principe per combattere i falsi?</p><p>Prince Chris Okagbue dell\'Onitsha Kingdom diventa il volto della campagna e il "Vaseline Authenticator" — un tool su WhatsApp che consente di verificare in secondi l\'autenticità di ogni prodotto. Gold Lion Social & Creator 2026.</p><p class="credits-line">📍 LEO per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','LEO'],['Paese','Singapore'],['Categoria','Media Lions'],['Medaglia','Bronze Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'tocayos-pr',cat:'pr',medal:'silver',title:'TOCAYOS',brand:'HEINEKEN',agency:'LEPUB',country:'🇮🇹 Italy',video:{type:'youtube',id:'VC_-2RzivYI'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/dab9c362b0f54c98988d19bcab03eb27/storyboard_000008.jpg',description:'<p>Heineken cerca e trova tutte le persone nel mondo che si chiamano Heineken (i "tocayos" — omonimi in spagnolo) e le trasforma in testimonial autentici. Una strategia creativa brillante che usa la coincidenza del nome come media. Grand Prix Creative Strategy Lions 2026, agenzia LePub.</p><p class="credits-line">📍 LEPUB per HEINEKEN, Italy.</p>',credits:[['Brand','HEINEKEN'],['Agenzia','LEPUB'],['Paese','Italy'],['Categoria','PR Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'vaseline-originals-pr',cat:'pr',medal:'silver',title:'VASELINE ORIGINALS',brand:'VASELINE',agency:'OGILVY SINGAPORE',country:'🇸🇬 Singapore',video:{type:'youtube',id:'hzq9lR5SsNo'},thumb:'https://img.youtube.com/vi/hzq9lR5SsNo/hqdefault.jpg',description:'<p>Vaseline ha ispirato milioni di beauty hack online per decenni. Ogilvy Singapore fa l\'unica cosa giusta: rintraccia i creator originali — quelli che nel 2008 inventarono i hack prima che diventassero virali — e trasforma le loro idee in prodotti ufficiali, condividendo con loro il successo commerciale.</p><p>Vaseline Brow Tamer e All-In-One Primer & Highlighter Jelly sold out in meno di un minuto al loro debutto TikTok Live. Un nuovo modello per fare prodotti: Silver Lion Creative B2B e Social & Creator, Cannes Lions 2026.</p><p class="credits-line">📍 OGILVY SINGAPORE per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','OGILVY SINGAPORE'],['Paese','Singapore'],['Categoria','PR Lions'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'look-familiar-print',cat:'print',medal:'grandprix',title:'LOOK FAMILIAR?',brand:'HEINZ KETCHUP',agency:'RETHINK',country:'🇨🇦 Canada',video:{type:'youtube',id:'Wzl0lePvAAs'},thumb:'https://img.youtube.com/vi/Wzl0lePvAAs/hqdefault.jpg',description:'<p>La sagoma di qualunque box di patatine fritte assomiglia stranamente al logo Heinz. Heinz se ne appropria con una campagna visiva purissima: niente testo, niente branding esplicito — solo la forma. Grand Prix Print & Publishing Lions 2026, agenzia Rethink Toronto.</p><p class="credits-line">📍 RETHINK per HEINZ KETCHUP, Canada.</p>',credits:[['Brand','HEINZ KETCHUP'],['Agenzia','RETHINK'],['Paese','Canada'],['Categoria','Print & Publishing Lions'],['Medaglia','Grand Prix'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'the-kitkat-heist-social',cat:'social',medal:'gold',title:'THE KITKAT HEIST',brand:'KITKAT',agency:'VML',country:'🇬🇧 United Kingdom',video:{type:'youtube',id:'1FNVd5GRkM4'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/3b6bc994badb4eccb1b9d32255241e60/storyboard_000008.jpg',description:'<p>KitKat orchestra un finto furto coordinato delle sue barrette in tutto il mondo — negozi svuotati, scaffali vuoti, "avvistamenti" sui social. Una crisi simulata che diventa la più grande campagna di PR spontanea del brand. Grand Prix PR Lions 2026, KitKat / Burson / VML London.</p><p class="credits-line">📍 VML per KITKAT, United Kingdom.</p>',credits:[['Brand','KITKAT'],['Agenzia','VML'],['Paese','United Kingdom'],['Categoria','Social & Creator Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'uberlandia-ec-social',cat:'social',medal:'gold',title:'UBERLANDIA E.C.',brand:'UBER',agency:'WIEDEN+KENNEDY',country:'🇧🇷 Brazil',video:null,thumb:'',description:'<p>Uber cerca il suo primo naming rights nel calcio globale. Il brief ideale esiste già: Uberlândia Esporte Clube, un club centenario del Minas Gerais che porta nel nome quattro lettere identiche al brand. Uber "acquista" un naming rights che non cambia nulla — e cambia tutto.</p><p>Wieden+Kennedy São Paulo trasforma una coincidenza linguistica in una piattaforma creativa. UberLÂNDIA E.C. adotta il carattere accentato nelle comunicazioni ufficiali. Gold Lion Social & Creator 2026.</p><p class="credits-line">📍 WIEDEN+KENNEDY per UBER, Brazil.</p>',credits:[['Brand','UBER'],['Agenzia','WIEDEN+KENNEDY'],['Paese','Brazil'],['Categoria','Social & Creator Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'vaseline-and-the-real-nigerian-prince-social',cat:'social',medal:'gold',title:'VASELINE AND THE REAL NIGERIAN PRINCE',brand:'VASELINE',agency:'LEO',country:'🇸🇬 Singapore',video:{type:'vimeo',id:'1181772726'},thumb:'https://vumbnail.com/1181772726.jpg',description:'<p>I prodotti Vaseline contraffatti invadono il mercato nigeriano — difficili da distinguere dai veri, pericolosi per la pelle. Leo Singapore trova l\'insight perfetto: ogni nigeriano conosce la truffa del "principe nigeriano". Perché non usare un vero principe per combattere i falsi?</p><p>Prince Chris Okagbue dell\'Onitsha Kingdom diventa il volto della campagna e il "Vaseline Authenticator" — un tool su WhatsApp che consente di verificare in secondi l\'autenticità di ogni prodotto. Gold Lion Social & Creator 2026.</p><p class="credits-line">📍 LEO per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','LEO'],['Paese','Singapore'],['Categoria','Social & Creator Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'vaseline-originals-social',cat:'social',medal:'gold',title:'VASELINE ORIGINALS',brand:'VASELINE',agency:'OGILVY SINGAPORE',country:'🇸🇬 Singapore',video:{type:'youtube',id:'hzq9lR5SsNo'},thumb:'https://img.youtube.com/vi/hzq9lR5SsNo/hqdefault.jpg',description:'<p>Vaseline ha ispirato milioni di beauty hack online per decenni. Ogilvy Singapore fa l\'unica cosa giusta: rintraccia i creator originali — quelli che nel 2008 inventarono i hack prima che diventassero virali — e trasforma le loro idee in prodotti ufficiali, condividendo con loro il successo commerciale.</p><p>Vaseline Brow Tamer e All-In-One Primer & Highlighter Jelly sold out in meno di un minuto al loro debutto TikTok Live. Un nuovo modello per fare prodotti: Silver Lion Creative B2B e Social & Creator, Cannes Lions 2026.</p><p class="credits-line">📍 OGILVY SINGAPORE per VASELINE, Singapore.</p>',credits:[['Brand','VASELINE'],['Agenzia','OGILVY SINGAPORE'],['Paese','Singapore'],['Categoria','Social & Creator Lions'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

{id:'the-thousand-sponsors-of-muni-sport',cat:'sport',medal:'grandprix',title:'THE THOUSAND SPONSORS OF MUNI',brand:'CLUB DEPORTIVO MUNICIPAL',agency:'McCANN LIMA',country:'🇵🇪 Peru',video:{type:'youtube',id:'tq775MZGE48'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/a9367862449f423fb6f06ca12982373e/storyboard_000008.jpg',description:'<p>Club Deportivo Municipal è una delle squadre più amate del Perù, ma senza sponsor tradizionali. McCann Lima trova 1.000 micro-sponsor tra i tifosi — ognuno contribuisce una piccola cifra e diventa parte della storia del club. Un modello di finanziamento creativo che cambia il calcio. Grand Prix Entertainment Lions for Sport 2026.</p><p class="credits-line">📍 McCANN LIMA per CLUB DEPORTIVO MUNICIPAL, Peru.</p>',credits:[['Brand','CLUB DEPORTIVO MUNICIPAL'],['Agenzia','McCANN LIMA'],['Paese','Peru'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Grand Prix'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'cerave---the-new-face-of-legs-sport',cat:'sport',medal:'gold',title:'CERAVE - THE NEW FACE OF LEGS',brand:'CERAVE',agency:'L\'OREAL',country:'🇺🇸 United States',video:{type:'youtube',id:'fGqkGLQoFNw'},thumb:'https://img.youtube.com/vi/fGqkGLQoFNw/hqdefault.jpg',description:'<p><strong>CERAVE - THE NEW FACE OF LEGS</strong> — <strong>Gold Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Entertainment Lions for Sport</strong>.</p><p>Sviluppato da <strong>L\'OREAL</strong> per <strong>CERAVE</strong> (United States), è una campagna sport che ha connesso un brand alla passione sportiva in modo autentico. Tra i lavori più riconosciuti dell\'anno al festival di Cannes.</p>',credits:[['Brand','CERAVE'],['Agenzia','L\'OREAL'],['Paese','United States'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'lucky-fan-index-sport',cat:'sport',medal:'gold',title:'LUCKY FAN INDEX',brand:'WISLA KRAKOW FOOTBALL CLUB',agency:'VML',country:'🇵🇱 Poland',video:{type:'youtube',id:'EZNQm5UxyMQ'},thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/9c9af7242b7f4f90a2db1ee397004d29/storyboard_000008.jpg',description:'<p>Ogni tifoso crede di portare fortuna alla sua squadra. Il Lucky Fan Index di Wisła Kraków (Polonia) lo misura davvero — analizzando le partite, la presenza, i gesti scaramantici — e trasforma la superstizione in un sistema di engagement irresistibile. Grand Prix Creative Commerce Lions 2026.</p><p class="credits-line">📍 VML per WISLA KRAKOW FOOTBALL CLUB, Poland.</p>',credits:[['Brand','WISLA KRAKOW FOOTBALL CLUB'],['Agenzia','VML'],['Paese','Poland'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'resize-the-price-sport',cat:'sport',medal:'gold',title:'RESIZE THE PRICE',brand:'AGUILA',agency:'DAVID',country:'🇨🇴 Colombia',video:{type:'youtube',id:'Xm7k9xRyXw4'},thumb:'https://img.youtube.com/vi/Xm7k9xRyXw4/hqdefault.jpg',description:'<p>Le maglie della nazionale colombiana costano sempre di più, mettendo il kit ufficiale fuori portata per molti tifosi. Aguila Beer e DAVID Bogotá trovano la soluzione: più grande è il logo Aguila sulla maglia, più basso è il prezzo. Un accordo con la federazione che fa dell\'advertising il meccanismo di pricing. Gold Lion Entertainment Lions for Sport 2026.</p><p class="credits-line">📍 DAVID per AGUILA, Colombia.</p>',credits:[['Brand','AGUILA'],['Agenzia','DAVID'],['Paese','Colombia'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Gold Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'a-mothers-commentary-sport',cat:'sport',medal:'silver',title:'A MOTHER\'S COMMENTARY',brand:'REPORTERS WITHOUT BORDERS',agency:'THE GOOD COMPANY',country:'🇫🇷 France',video:null,thumb:'https://ascentialcdn.filespin.io/api/v1/storyboard/8e5f86f589654c90b1243137d2e48c16/storyboard_000008.jpg',description:'<p><strong>A MOTHER\'S COMMENTARY</strong> riceve il <strong>Silver Lion</strong> ai Cannes Lions 2026 nella categoria <strong>Entertainment Lions for Sport</strong>.</p><p>THE GOOD COMPANY firma questo lavoro per <strong>REPORTERS WITHOUT BORDERS</strong> (France): una campagna sport che ha connesso un brand alla passione sportiva in modo autentico e si guadagna un posto tra le eccellenze creative globali dell\'anno.</p>',credits:[['Brand','REPORTERS WITHOUT BORDERS'],['Agenzia','THE GOOD COMPANY'],['Paese','France'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'axa---nothing-stops-womens-rugby-sport',cat:'sport',medal:'silver',title:'AXA - NOTHING STOPS WOMEN\'S RUGBY',brand:'AXA FRANCE',agency:'PUBLICIS CONSEIL',country:'🇫🇷 France',video:{type:'youtube',id:'ynCZW7_Ug0U'},thumb:'https://img.youtube.com/vi/ynCZW7_Ug0U/hqdefault.jpg',description:'<p>AXA France è il primo brand a sponsorizzare tutto il rugby femminile in Francia — dal top level all\'amateur. Publicis Conseil trasforma questo impegno in un film manifesto che racconta la storia del rugby femminile come lotta continua contro i pregiudizi, tra passato e presente.</p><p>3 minuti in prima serata su France TV, 50 club femminili amatoriali dotati di divise complete. Silver Lion Film e Film Craft 2026.</p><p class="credits-line">📍 PUBLICIS CONSEIL per AXA FRANCE, France.</p>',credits:[['Brand','AXA FRANCE'],['Agenzia','PUBLICIS CONSEIL'],['Paese','France'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'kyle-fcking-connor-sport',cat:'sport',medal:'silver',title:'KYLE F*CKING CONNOR',brand:'KFC CANADA',agency:'COURAGE',country:'🇨🇦 Canada',video:{type:'youtube',id:'bSL1iz37-Gg'},thumb:'https://img.youtube.com/vi/bSL1iz37-Gg/hqdefault.jpg',description:'<p>Kyle Connor è il capitano dei Winnipeg Jets e l\'idolo della città. I tifosi lo cantano con una canzone che ha come ritornello il suo nome seguito da una parolaccia. KFC Canada abbraccia il doppio senso e lancia "The Kyle F*cking Connor Meal" — branding involontario diventato campagna ufficiale. Gold Lion Experience 2026.</p><p class="credits-line">📍 COURAGE per KFC CANADA, Canada.</p>',credits:[['Brand','KFC CANADA'],['Agenzia','COURAGE'],['Paese','Canada'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},
{id:'supernova-adaptive-sport',cat:'sport',medal:'silver',title:'SUPERNOVA ADAPTIVE',brand:'ADIDAS',agency:'TBWA\CANADA',country:'🇨🇦 Canada',video:{type:'youtube',id:'mFHksfNwhoY'},thumb:'https://img.youtube.com/vi/mFHksfNwhoY/hqdefault.jpg',description:'<p>La prima scarpa da running Adidas progettata ab initio per atleti con disabilità fisiche — e poi resa disponibile a tutti. Supernova Adaptive ribalta il paradigma dell\'accessibilità: non un adattamento dell\'esistente, ma un nuovo punto di partenza. Grand Prix Innovation Lions 2026.</p><p class="credits-line">📍 TBWA\CANADA per ADIDAS, Canada.</p>',credits:[['Brand','ADIDAS'],['Agenzia','TBWA\CANADA'],['Paese','Canada'],['Categoria','Entertainment Lions for Sport'],['Medaglia','Silver Lion'],['Anno','2026'],['Fonte','lovethework.com']]},

<script>
// ===================== HELPERS =====================
function yt(id){return id?`https://img.youtube.com/vi/${id}/hqdefault.jpg`:'';}
function thumbURL(c){
  if(c.thumb) return c.thumb;
  if(c.video?.type==='youtube'&&c.video.id) return yt(c.video.id);
  return '';
}
function videoEmbed(v){
  if(!v) return '';
  if(v.type==='youtube'&&v.id) return`<iframe src="https://www.youtube.com/embed/${v.id}?rel=0" loading="lazy" allowfullscreen></iframe>`;
  if(v.type==='vimeo'&&v.id) return`<iframe src="https://player.vimeo.com/video/${v.id}?dnt=1" loading="lazy" allowfullscreen></iframe>`;
  return '';
}
function medalLabel(m){return{grandprix:'🏆 Grand Prix',gold:'🥇 Gold Lion',silver:'🥈 Silver Lion',bronze:'🥉 Bronze Lion'}[m]||m;}
function medalClass(m){return{grandprix:'wm-gp',gold:'wm-gold',silver:'wm-silver',bronze:'wm-bronze'}[m]||'wm-bronze';}
function mlClass(m){return{grandprix:'ml-gp',gold:'ml-gold',silver:'ml-silver',bronze:'ml-bronze'}[m]||'ml-bronze';}
function navigate(path){location.hash='#'+path;}
function getCat(id){return CATEGORIES.find(c=>c.id===id);}
function getCasesByCat(catId){return CASES.filter(c=>c.cat===catId);}
function getCasesRelated(cs){return CASES.filter(c=>c.cat===cs.cat&&c.id!==cs.id).slice(0,4);}
function navMode(mode){
  document.getElementById('nav-back').style.display = mode==='back'?'flex':'none';
}
function initReveal(){
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}
  }),{threshold:0.07});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

// ===================== CARD BUILDER =====================
function winCard(c,catIcon,full){
  const cat=getCat(c.cat);
  const thumb=thumbURL(c);
  const hasVideo=c.video&&(c.video.id||c.video.type);
  const excerpt=c.description?c.description.replace(/<[^>]*>/g,'').slice(0,140)+'…':'';
  return`
<div class="win-card${full?' full':''}" onclick="navigate('/case/${c.id}')">
  <div class="win-thumb">
    ${thumb?`<img src="${thumb}" alt="${c.title}" loading="lazy">`
      :`<div class="win-thumb-placeholder">${catIcon||'🏆'}</div>`}
    ${hasVideo?`<div class="win-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`:''}
  </div>
  <div class="win-body">
    <span class="win-medal ${medalClass(c.medal)}">${medalLabel(c.medal)}</span>
    <div class="win-title">${c.title}</div>
    <div class="win-brand">${c.brand}</div>
    ${c.agency?`<div class="win-agency">${c.agency}</div>`:''}
    ${excerpt?`<div class="win-excerpt">${excerpt}</div>`:''}
    <button class="win-cta">Scopri di più
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </button>
  </div>
</div>`;
}

// ===================== SEARCH =====================
window._search={q:'',medal:'',cat:'',country:'',agency:''};

function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
  runSearch();
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
}
function handleSearchInput(val){
  window._search.q=val;
  runSearch();
}
function handleFilterChange(key,val){
  window._search[key]=val;
  runSearch();
}
function runSearch(){
  const {q,medal,cat,country,agency}=window._search;
  const ql=q.toLowerCase().trim();
  let results=CASES.filter(c=>{
    if(medal&&c.medal!==medal) return false;
    if(cat&&c.cat!==cat) return false;
    if(country&&!(c.country||'').toLowerCase().includes(country.toLowerCase())) return false;
    if(agency&&!(c.agency||'').toLowerCase().includes(agency.toLowerCase())) return false;
    if(ql&&![c.title,c.brand,c.agency,c.country,c.cat].join(' ').toLowerCase().includes(ql)) return false;
    return true;
  });
  const area=document.getElementById('search-results');
  if(!area) return;
  if(!results.length){
    area.innerHTML=`<div class="search-empty">Nessun risultato trovato per i filtri selezionati.</div>`;
    return;
  }
  const count=document.getElementById('search-count');
  if(count) count.textContent=`${results.length} risultat${results.length===1?'o':'i'}`;
  area.innerHTML=results.map(c=>{
    const cat=getCat(c.cat);
    const thumb=thumbURL(c);
    return`<div class="search-result-item" onclick="closeSearch();navigate('/case/${c.id}')">
      <div class="search-result-thumb">
        ${thumb?`<img src="${thumb}" alt="" loading="lazy">`:`<div class="search-result-thumb-ph">${cat?.icon||'🏆'}</div>`}
      </div>
      <div class="search-result-info">
        <div class="search-result-title">${c.title}</div>
        <div class="search-result-meta">${c.brand}${c.agency?' · '+c.agency:''} · ${cat?.name||c.cat} ${c.country||''}</div>
      </div>
      <span class="search-result-medal ${medalClass(c.medal)}">${medalLabel(c.medal)}</span>
    </div>`;
  }).join('');
}

// Build search overlay HTML (injected once into body)
function injectSearchOverlay(){
  const catOptions=CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  const countries=[...new Set(CASES.map(c=>c.country).filter(Boolean))].sort();
  const countryOptions=countries.map(c=>`<option value="${c}">${c}</option>`).join('');
  const overlay=document.createElement('div');
  overlay.className='search-overlay';
  overlay.id='search-overlay';
  overlay.onclick=e=>{if(e.target===overlay)closeSearch();};
  overlay.innerHTML=`
<div class="search-modal">
  <div class="search-input-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Cerca case study, brand, agenzia…"
      oninput="handleSearchInput(this.value)"
      onkeydown="if(event.key==='Escape')closeSearch()">
    <button class="search-close-btn" onclick="closeSearch()">✕</button>
  </div>
  <div class="search-filters-row">
    <select class="search-filter-select" onchange="handleFilterChange('medal',this.value)">
      <option value="">Tutti i premi</option>
      <option value="grandprix">🏆 Grand Prix</option>
      <option value="gold">🥇 Gold Lion</option>
      <option value="silver">🥈 Silver Lion</option>
      <option value="bronze">🥉 Bronze Lion</option>
    </select>
    <select class="search-filter-select" onchange="handleFilterChange('cat',this.value)">
      <option value="">Tutte le categorie</option>${catOptions}
    </select>
    <select class="search-filter-select" onchange="handleFilterChange('country',this.value)">
      <option value="">Tutti i paesi</option>${countryOptions}
    </select>
    <input class="search-filter-select" type="text" placeholder="Agenzia…"
      oninput="handleFilterChange('agency',this.value)"
      style="width:140px;border-radius:980px;padding:5px 12px;font-size:12px;outline:none">
  </div>
  <div class="search-count" id="search-count"></div>
  <div class="search-results-area" id="search-results"></div>
</div>`;
  document.body.appendChild(overlay);
}

function renderCategory(catId){
  const cat=getCat(catId);
  if(!cat){navigate('/');return;}
  navMode('back');
  const track=TRACKS[cat.track];
  const cases=getCasesByCat(catId);
  const byMedal=m=>cases.filter(c=>c.medal===m);
  const gp=byMedal('grandprix'), gold=byMedal('gold'),
        silver=byMedal('silver'), bronze=byMedal('bronze');

  const bgColor={classic:'#0d1b3e',craft:'#3b0a0a',entertainment:'#2d1800',
    experience:'#0a2d0f',strategy:'#1e0a3b',engagement:'#0a1a3b',
    good:'#0a2d12',design:'#2d0a06',innovation:'#001a1c',brand:'#2d0a1e',titanium:'#1c1c1e'}[cat.track]||'#000';

  let html=`
<div class="cat-hero" style="background:${bgColor}">
  <div class="cat-hero-inner">
    <span class="cat-hero-icon">${cat.icon}</span>
    <h1>${cat.name}</h1>
    <p class="cat-hero-sub">${cat.desc} · ${track.name}</p>
    <div class="cat-hero-stats">
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.gp}</div><div class="cat-stat-l">Grand Prix</div></div>
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.gold}</div><div class="cat-stat-l">Gold</div></div>
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.silver}</div><div class="cat-stat-l">Silver</div></div>
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.bronze}</div><div class="cat-stat-l">Bronze</div></div>
    </div>
  </div>
</div>`;

  function medalSection(list, medal, label){
    if(!list.length) return '';
    const isGP=medal==='grandprix';
    return`<div class="medal-section reveal">
      <span class="medal-label-pill ${mlClass(medal)}">${medalLabel(medal)}</span>
      <h2>${isGP?'Il massimo riconoscimento':label+' in questa categoria'}</h2>
      <div class="win-grid">
        ${list.map(c=>winCard(c,cat.icon,isGP&&list.length===1)).join('')}
      </div>
    </div><div class="divider"></div>`;
  }

  html += medalSection(gp,'grandprix','Grand Prix');
  html += medalSection(gold,'gold',`${gold.length} Gold Lion`);
  html += medalSection(silver,'silver',`${silver.length} Silver Lion`);
  html += medalSection(bronze,'bronze',`${bronze.length} Bronze Lion`);

  if(!silver.length||!bronze.length){
    html+=`<div class="medal-section" style="text-align:center;padding:32px 24px">
      <p style="font-size:14px;color:var(--mid)">Per la lista completa dei vincitori visita
        <a href="https://www.lovethework.com" target="_blank" style="color:var(--blue)">lovethework.com</a>
      </p>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  initReveal();
}

window._luckyFilters={grandprix:true,gold:true,silver:false,bronze:false};

function luckyBuildPool(){
  const f=window._luckyFilters;
  const pool=CASES.filter(c=>f[c.medal]);
  window._luckyShuffled=[...pool].sort(()=>Math.random()-.5);
  window._luckyIdx=-1;
  // update counter
  const cnt=document.getElementById('lucky-counter');
  if(cnt) cnt.textContent=`${pool.length} case nel pool • Premi per estrarne uno`;
}

function luckyToggleMedal(medal){
  window._luckyFilters[medal]=!window._luckyFilters[medal];
  // keep at least one active
  if(!Object.values(window._luckyFilters).some(Boolean)){
    window._luckyFilters[medal]=true; return;
  }
  // update pill UI
  document.querySelectorAll('.lucky-pill').forEach(el=>{
    const m=el.dataset.medal;
    el.classList.toggle('active',!!window._luckyFilters[m]);
  });
  luckyBuildPool();
  // reset showcase
  const sc=document.getElementById('lucky-showcase');
  if(sc){
    sc.innerHTML=`<div class="lucky-no-media">🦁</div>
    <div class="lucky-info-bar"><div class="lucky-info-left">
      <div class="lucky-info-title" style="color:rgba(255,255,255,0.3);font-style:italic">Pool aggiornato — estrai un nuovo vincitore…</div>
    </div></div>`;
  }
  const btn=document.getElementById('lucky-btn');
  if(btn) btn.innerHTML=`<span class="dice">🎲</span> Estrai un vincitore`;
}

function luckyRoll(){
  const btn=document.getElementById('lucky-btn');
  const showcase=document.getElementById('lucky-showcase');
  const counter=document.getElementById('lucky-counter');
  const pool=window._luckyShuffled||[];
  if(!pool.length) return;

  btn.classList.add('rolling');
  showcase.classList.add('fading');

  setTimeout(()=>{
    window._luckyIdx=(window._luckyIdx+1)%pool.length;
    const c=pool[window._luckyIdx];
    const cat=getCat(c.cat);
    const thumb=thumbURL(c);
    const hasVideo=c.video&&c.video.id;

    let mediaHtml='';
    if(hasVideo) mediaHtml=`<div class="lucky-video-wrap">${videoEmbed(c.video)}</div>`;
    else if(thumb) mediaHtml=`<div class="lucky-img-wrap"><img src="${thumb}" alt="${c.title}"></div>`;
    else mediaHtml=`<div class="lucky-no-media">${cat?.icon||'🏆'}</div>`;

    showcase.innerHTML=`
      ${mediaHtml}
      <div class="lucky-info-bar">
        <div class="lucky-info-left">
          <div class="lucky-info-medal win-medal ${medalClass(c.medal)}">${medalLabel(c.medal)}</div>
          <div class="lucky-info-title">${c.title}</div>
          <div class="lucky-info-brand">${c.brand}${c.agency?' · '+c.agency:''}</div>
          <div class="lucky-info-cat">${cat?.icon||''} ${cat?.name||c.cat} · ${c.country||''}</div>
        </div>
        <button class="lucky-details-btn" onclick="navigate('/case/${c.id}')">Scopri di più →</button>
      </div>`;

    showcase.classList.remove('fading');
    btn.classList.remove('rolling');
    btn.innerHTML=`<span class="dice">🎲</span> Prossimo vincitore`;
    counter.textContent=`Vincitore #${window._luckyIdx+1} di ${pool.length} · ${cat?.name||''}`;
  },380);
}

  <div class="about-section reveal">

      <div class="about-section-content">
        <h2>Cannes Lions 2026 — Winners Archive</h2>
        <p>Questo sito nasce da una domanda semplice: <strong>perché i vincitori del festival più importante della creatività pubblicitaria mondiale sono così difficili da esplorare?</strong> I dati ci sono, le campagne anche — ma l'esperienza di navigarle è spesso dispersiva, frammentata tra comunicati stampa, PDF e siti di categoria.</p>
        <p>L'idea è stata raccogliere tutti i Grand Prix, Gold, Silver e Bronze di Cannes Lions 2026 in un'unica esperienza digitale — organizzata per categoria, track e livello di premio — con video, descrizioni, credits e pagine dedicate per ogni case study.</p>
        <p>Il sito è costruito come <strong>Single Page Application</strong> con routing hash-based, completamente statico su GitHub Pages — zero backend, zero dipendenze esterne, massima velocità. Il design punta su tipografia system-font, whitespace generoso, card layout e transizioni fluide.</p>

          <div class="about-stat-cell">
            <div class="about-stat-n">29</div>

        <p>Il progetto include una <strong>pagina "I'm Feeling Lucky"</strong> che estrae un vincitore casuale dal pool — filtrabile per tipologia di premio — e una <strong>barra di ricerca</strong> stile Spotlight (⌘K) che permette di filtrare per testo, categoria, paese, agenzia e livello di premio.</p>
        <p>Realizzato interamente con <strong>Claude</strong> di Anthropic in una sessione di lavoro in Cowork mode.</p>

// ===================== ROUTER =====================
function route(){
  const hash=location.hash||'#/';
  const path=hash.replace('#','');
  if(path==='/'||path===''){renderHome();return;}
  if(path==='/lucky'){renderLucky();return;}
  if(path==='/about'){renderAbout();return;}
  const parts=path.split('/').filter(Boolean);
  if(parts[0]==='category'&&parts[1]){renderCategory(parts[1]);return;}
  if(parts[0]==='case'&&parts[1]){renderCase(parts[1]);return;}
  renderHome();
}

window.addEventListener('hashchange',route);

// ⌘K shortcut
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'){closeSearch();}
});

// Inject search overlay once on load
injectSearchOverlay();
