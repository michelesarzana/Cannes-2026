<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cannes Lions 2026 — Winners</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1d1d1f;--white:#f5f5f7;--off:#fbfbfd;--mid:#86868b;--light:#d2d2d7;
  --blue:#0071e3;--blue2:#0077ed;--gold:#f5a623;--silver:#8e8e93;--bronze:#8d6e63;
  --gp-grad:linear-gradient(135deg,#FFD700,#FFA500);
  --nav:rgba(255,255,255,0.85);--r:18px;--shadow:0 4px 24px rgba(0,0,0,0.08);
  --t:.3s cubic-bezier(.25,.46,.45,.94)
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  background:var(--off);color:var(--black);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:1000;background:var(--nav);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.08);height:52px;display:flex;align-items:center}
.nav-inner{max-width:1280px;width:100%;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:16px;font-weight:700;color:var(--black);text-decoration:none;
  letter-spacing:-0.3px;cursor:pointer;display:flex;align-items:center;gap:8px}
.nav-logo span{font-size:22px}
.nav-back{display:none;align-items:center;gap:6px;font-size:14px;color:var(--blue);
  cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 0}
.nav-back:hover{opacity:.7}
.nav-back svg{width:18px;height:18px}

/* APP CONTAINER */
#app{min-height:100vh}

/* =================== HOME =================== */
.hero{background:#000;color:#fff;min-height:88vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;
  position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a1a2e,#000)}
.hero-badge{position:relative;display:inline-block;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);border-radius:100px;padding:6px 16px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,0.75);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:28px;backdrop-filter:blur(10px)}
.hero h1{position:relative;font-size:clamp(52px,9vw,100px);font-weight:700;
  letter-spacing:-3px;line-height:.95;margin-bottom:20px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.55) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{position:relative;font-size:clamp(18px,2.5vw,24px);color:rgba(255,255,255,0.5);
  letter-spacing:-.3px;max-width:560px;margin-bottom:48px}
.hero-stats{position:relative;display:flex;gap:48px;margin-bottom:52px}
.stat-num{font-size:42px;font-weight:700;letter-spacing:-1.5px;color:#fff}
.stat-label{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;
  letter-spacing:1px;margin-top:4px}
.hero-cta{position:relative;display:inline-block;background:var(--blue);color:#fff;
  text-decoration:none;padding:14px 32px;border-radius:980px;font-size:15px;
  font-weight:500;cursor:pointer;border:none;font-family:inherit;
  transition:background var(--t),transform var(--t)}
.hero-cta:hover{background:var(--blue2);transform:scale(1.02)}

/* TRACK SECTION */
.section{max-width:1280px;margin:0 auto;padding:64px 24px}
.track-header{margin-bottom:32px}
.track-eyebrow{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:6px}
.track-title{font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-1px;line-height:1.05}
.track-desc{font-size:16px;color:var(--mid);margin-top:10px;max-width:480px}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.cat-card{background:#fff;border-radius:var(--r);padding:28px;cursor:pointer;
  box-shadow:var(--shadow);transition:transform var(--t),box-shadow var(--t);
  border:1px solid rgba(0,0,0,0.04);position:relative;overflow:hidden}
.cat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,
  rgba(0,113,227,0.04),transparent);opacity:0;transition:opacity var(--t)}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.12)}
.cat-card:hover::after{opacity:1}
.cat-icon{font-size:32px;margin-bottom:14px}
.cat-name{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.cat-track-badge{display:inline-block;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:100px;
  margin-bottom:12px}
.track-classic .cat-track-badge{background:#e8f0fe;color:#1a73e8}
.track-craft .cat-track-badge{background:#fce8e6;color:#d93025}
.track-entertainment .cat-track-badge{background:#fff3e0;color:#e65100}
.track-experience .cat-track-badge{background:#e8f5e9;color:#2e7d32}
.track-strategy .cat-track-badge{background:#f3e8fd;color:#6a1b9a}
.track-engagement .cat-track-badge{background:#e3f2fd;color:#0d47a1}
.track-good .cat-track-badge{background:#f1f8e9;color:#33691e}
.track-design .cat-track-badge{background:#fbe9e7;color:#bf360c}
.track-innovation .cat-track-badge{background:#e0f7fa;color:#006064}
.track-brand .cat-track-badge{background:#fdf1f8;color:#880e4f}
.track-titanium .cat-track-badge{background:#263238;color:#fff}
.cat-desc{font-size:13px;color:var(--mid);line-height:1.5;margin-bottom:16px}
.cat-medals{display:flex;gap:10px;font-size:11px;font-weight:600;flex-wrap:wrap}
.medal-gp{color:#FFA500}
.medal-gold{color:#b8860b}
.medal-silver{color:#888}
.medal-bronze{color:#8d6e63}

/* DIVIDER */
.divider{height:1px;background:rgba(0,0,0,0.07);margin:0 24px}

/* =================== CATEGORY PAGE =================== */
.cat-hero{background:#000;color:#fff;padding:72px 24px 56px;text-align:center}
.cat-hero-inner{max-width:800px;margin:0 auto}
.cat-hero-icon{font-size:56px;margin-bottom:16px;display:block}
.cat-hero h1{font-size:clamp(36px,6vw,72px);font-weight:700;letter-spacing:-2px;
  line-height:1;margin-bottom:14px}
.cat-hero-sub{font-size:18px;color:rgba(255,255,255,0.5);margin-bottom:24px}
.cat-hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.cat-stat{text-align:center}
.cat-stat-n{font-size:28px;font-weight:700;color:#fff;letter-spacing:-1px}
.cat-stat-l{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* MEDAL SECTIONS */
.medal-section{max-width:1280px;margin:0 auto;padding:56px 24px}
.medal-label{display:inline-flex;align-items:center;gap:8px;border-radius:100px;
  padding:6px 18px;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:24px}
.ml-gp{background:var(--gp-grad);color:#000}
.ml-gold{background:linear-gradient(135deg,#FFD700,#FFB300);color:#000}
.ml-silver{background:linear-gradient(135deg,#E0E0E0,#9E9E9E);color:#fff}
.ml-bronze{background:linear-gradient(135deg,#CD7F32,#8D6E63);color:#fff}
.medal-section h2{font-size:clamp(22px,3vw,32px);font-weight:700;letter-spacing:-.6px;margin-bottom:32px}

/* WINNERS GRID */
.win-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.win-card{background:#fff;border-radius:var(--r);overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);transition:transform var(--t),box-shadow var(--t)}
.win-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.14)}
.win-card.full{grid-column:1/-1}
.win-thumb{position:relative;width:100%;padding-bottom:56.25%;background:#111;overflow:hidden}
.win-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .4s ease}
.win-card:hover .win-thumb img{transform:scale(1.04)}
.win-thumb-placeholder{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;background:linear-gradient(135deg,#1a1a2e,#0d3b5e);
  font-size:48px}
.win-play{position:absolute;bottom:12px;right:12px;width:40px;height:40px;
  border-radius:50%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center}
.win-play svg{fill:#fff;width:16px;height:16px;margin-left:2px}
.win-body{padding:22px}
.win-medal{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;padding:3px 10px;border-radius:100px;margin-bottom:10px}
.wm-gp{background:var(--gp-grad);color:#000}
.wm-gold{background:linear-gradient(135deg,#FFD700,#FFB300);color:#000}
.wm-silver{background:#E0E0E0;color:#555}
.wm-bronze{background:#cd7f32;color:#fff}
.win-title{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.2;margin-bottom:5px}
.win-brand{font-size:13px;color:var(--mid);font-weight:500;margin-bottom:4px}
.win-agency{font-size:12px;color:var(--light);font-style:italic}
.win-excerpt{font-size:13px;color:#515154;line-height:1.55;margin-top:10px}

/* SIMPLE LIST for silver/bronze */
.simple-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.simple-item{background:#fff;border-radius:12px;padding:16px 18px;cursor:pointer;
  border:1px solid rgba(0,0,0,0.06);transition:border-color var(--t),transform var(--t)}
.simple-item:hover{border-color:var(--blue);transform:translateX(4px)}
.si-title{font-size:14px;font-weight:600;letter-spacing:-.2px;margin-bottom:3px}
.si-brand{font-size:12px;color:var(--mid)}

.see-more{margin-top:20px;text-align:center}
.see-more a{color:var(--blue);font-size:14px;text-decoration:none}
.see-more a:hover{text-decoration:underline}

/* =================== CASE STUDY PAGE =================== */
.case-hero{background:#000;padding:0}
.case-video-wrap{position:relative;width:100%;max-height:640px;overflow:hidden;background:#000}
.case-video-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.case-img-hero{width:100%;max-height:520px;object-fit:cover;display:block}

.case-body{max-width:900px;margin:0 auto;padding:56px 24px 80px}
.case-meta-top{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.case-medal-badge{display:inline-flex;align-items:center;gap:6px;border-radius:100px;
  padding:6px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.case-cat-tag{font-size:12px;color:var(--mid);background:rgba(0,0,0,0.06);
  border-radius:100px;padding:4px 12px;font-weight:500}
.case-title{font-size:clamp(28px,5vw,56px);font-weight:700;letter-spacing:-1.5px;
  line-height:1.05;margin-bottom:12px}
.case-tagline{font-size:18px;color:var(--mid);margin-bottom:32px;font-weight:400}

.case-info-bar{display:flex;gap:32px;padding:24px 0;border-top:1px solid rgba(0,0,0,0.08);
  border-bottom:1px solid rgba(0,0,0,0.08);margin-bottom:40px;flex-wrap:wrap}
.case-info-item{}
.case-info-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--mid);font-weight:600;margin-bottom:4px}
.case-info-value{font-size:15px;font-weight:600;letter-spacing:-.2px}

.case-description{font-size:17px;line-height:1.7;color:#3a3a3c;margin-bottom:40px}
.case-description p{margin-bottom:18px}

.case-video-section{margin-bottom:40px}
.case-video-section h3{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.3px}
.video-embed{border-radius:var(--r);overflow:hidden;background:#000}
.video-embed iframe{width:100%;aspect-ratio:16/9;border:none;display:block}

.case-credits{margin-bottom:40px}
.case-credits h3{font-size:18px;font-weight:700;margin-bottom:20px;letter-spacing:-.3px}
.credits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0;
  border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.08)}
.credit-row{display:contents}
.credit-label{font-size:12px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--mid);font-weight:600;padding:14px 18px;background:#f9f9fb;
  border-bottom:1px solid rgba(0,0,0,0.06)}
.credit-value{font-size:14px;font-weight:500;padding:14px 18px;background:#fff;
  border-bottom:1px solid rgba(0,0,0,0.06)}
.credits-table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;
  border:1px solid rgba(0,0,0,0.08)}
.credits-table tr:last-child td{border-bottom:none}
.credits-table td{padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:14px}
.credits-table td:first-child{font-size:11px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--mid);font-weight:700;background:#f9f9fb;width:140px}

.related-section{margin-top:56px;padding-top:40px;border-top:1px solid rgba(0,0,0,0.08)}
.related-section h3{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:24px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.related-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);transition:transform var(--t)}
.related-card:hover{transform:translateY(-3px)}
.related-thumb{width:100%;padding-bottom:56.25%;position:relative;background:#111}
.related-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.related-body{padding:14px}
.related-title{font-size:14px;font-weight:600;letter-spacing:-.2px;margin-bottom:3px}
.related-brand{font-size:12px;color:var(--mid)}

/* SPECIAL AWARDS */
.special-section{background:#1d1d1f;color:#fff;padding:64px 24px}
.special-inner{max-width:1280px;margin:0 auto}
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:32px}
.special-card{background:#2c2c2e;border-radius:var(--r);padding:24px}
.special-rank{font-size:32px;font-weight:700;color:var(--gold);letter-spacing:-1px;margin-bottom:4px}
.special-name{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
.special-label{font-size:11px;color:#8e8e93;text-transform:uppercase;letter-spacing:.8px}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .55s ease,transform .55s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:768px){
  .hero-stats{gap:24px}
  .stat-num{font-size:28px}
  .win-card.full{grid-column:auto}
  .case-info-bar{gap:20px}
}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;
  font-size:18px;color:var(--mid)}
</style>
</head>

</nav>

// =====================================================
// HELPERS
// =====================================================
function yt(id){return`https://img.youtube.com/vi/${id}/hqdefault.jpg`}

function medalClass(m){return{grandprix:'wm-gp',gold:'wm-gold',silver:'wm-silver',bronze:'wm-bronze'}[m]||'wm-bronze'}
function medalLabel(m){return{grandprix:'🏆 Grand Prix',gold:'🥇 Gold Lion',silver:'🥈 Silver Lion',bronze:'🥉 Bronze Lion'}[m]||m}
function mlClass(m){return{grandprix:'ml-gp',gold:'ml-gold',silver:'ml-silver',bronze:'ml-bronze'}[m]}

function videoEmbed(v){
  if(!v)return'';
  if(v.type==='youtube') return`<iframe src="https://www.youtube.com/embed/${v.id}?rel=0" loading="lazy" allowfullscreen title="Video"></iframe>`;
  if(v.type==='vimeo') return`<iframe src="https://player.vimeo.com/video/${v.id}?dnt=1" loading="lazy" allowfullscreen title="Video"></iframe>`;
  return'';
}

function thumbURL(c){
  if(c.thumb) return c.thumb;
  if(c.video?.type==='youtube') return yt(c.video.id);
  return'';
}

function navigate(path){
  location.hash = path==='/'?'#/':'#'+path;
}

function getCasesByCategory(catId){
  return CASES.filter(c=>c.cat===catId);
}

function getCasesRelated(cs){
  return CASES.filter(c=>c.cat===cs.cat&&c.id!==cs.id).slice(0,4);
}

function renderHome(){
  document.getElementById('nav-back').style.display='none';
  const trackOrder=['classic','craft','entertainment','experience','strategy','engagement','good','design','innovation','brand','titanium'];

  let html=`
  <section class="hero">
    <div class="hero-badge">Festival Internazionale della Creatività · Giugno 2026</div>
    <h1>Cannes Lions<br>2026</h1>
    <p class="hero-sub">Tutti i Grand Prix, Oro, Argento e Bronzo della creatività pubblicitaria mondiale</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num">29</div><div class="stat-label">Categorie</div></div>
      <div class="stat"><div class="stat-num">32</div><div class="stat-label">Grand Prix</div></div>
      <div class="stat"><div class="stat-num">800+</div><div class="stat-label">Lions</div></div>
    </div>
    <button class="hero-cta" onclick="document.getElementById('cats').scrollIntoView({behavior:'smooth'})">Esplora i vincitori</button>
  </section>
  <div id="cats">`;

  trackOrder.forEach(trackId=>{
    const cats=CATEGORIES.filter(c=>c.track===trackId);
    if(!cats.length)return;
    const track=TRACKS[trackId];
    html+=`<div class="section reveal">
      <div class="track-header">
        <div class="track-eyebrow">${track.name}</div>
        <div class="track-title">${trackId==='titanium'?'Il Leone più ambito':cats.map(c=>c.name).join(' · ')}</div>
      </div>
      <div class="cat-grid">`;
    cats.forEach(cat=>{
      html+=`<div class="cat-card track-${cat.track}" onclick="navigate('/category/${cat.id}')">
        <div class="cat-icon">${cat.icon}</div>
        <span class="cat-track-badge">${TRACKS[cat.track].name}</span>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-desc">${cat.desc}</div>
        <div class="cat-medals">
          <span class="medal-gp">🏆 ${cat.counts.gp} GP</span>
          <span class="medal-gold">🥇 ${cat.counts.gold} Gold</span>
          <span class="medal-silver">🥈 ${cat.counts.silver} Silver</span>
          <span class="medal-bronze">🥉 ${cat.counts.bronze} Bronze</span>
        </div>
      </div>`;
    });
    html+=`</div></div><div class="divider"></div>`;
  });

  html+=`</div>
  <section class="special-section">
    <div class="special-inner">
      <div class="track-eyebrow" style="color:#f5a623">Special Awards</div>
      <h2 style="color:#fff;font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-1px;margin-top:8px">I premi speciali 2026</h2>`;

  ['Agency of the Year',"Network of the Year","Independent Network of the Year","Palme d'Or","Creative Brand of the Year"].forEach(label=>{
    const items=SPECIAL.filter(s=>s.label===label);
    html+=`<div style="margin-top:36px">
      <div class="track-eyebrow" style="color:#8e8e93;margin-bottom:16px">${label}</div>
      <div class="special-grid">`;
    items.forEach(s=>{
      html+=`<div class="special-card">
        <div class="special-rank">${s.rank}</div>
        <div class="special-name">${s.name}</div>
        <div class="special-label">${s.label}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  html+=`</div></section>
  <footer style="background:#f5f5f7;border-top:1px solid rgba(0,0,0,0.08);padding:48px 24px;text-align:center">
    <div style="font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px">🦁 Cannes Lions 2026</div>
    <p style="font-size:13px;color:#86868b;max-width:500px;margin:0 auto 20px">Raccolta completa di tutti i vincitori del Festival Internazionale della Creatività 2026. Fonti: Creative Review, shots.net, LBBOnline, contagious.com, canneslions.com.</p>
    <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap">
      <a href="https://www.canneslions.com" target="_blank" style="font-size:12px;color:#86868b;text-decoration:none">canneslions.com</a>
      <a href="https://www.creativereview.co.uk" target="_blank" style="font-size:12px;color:#86868b;text-decoration:none">Creative Review</a>
      <a href="https://shots.net" target="_blank" style="font-size:12px;color:#86868b;text-decoration:none">shots.net</a>
      <a href="https://lbbonline.com" target="_blank" style="font-size:12px;color:#86868b;text-decoration:none">LBBOnline</a>
    </div>
  </footer>`;

  document.getElementById('app').innerHTML=html;
  initReveal();
}

function renderCategory(catId){
  const cat=CATEGORIES.find(c=>c.id===catId);
  if(!cat){navigate('/');return;}
  const cases=getCasesByCategory(catId);
  const gp=cases.filter(c=>c.medal==='grandprix');
  const gold=cases.filter(c=>c.medal==='gold');
  const track=TRACKS[cat.track];

  const nb=document.getElementById('nav-back');
  nb.style.display='flex';

  let html=`
  <div class="cat-hero" style="background:${cat.color||'#000'}">
    <div class="cat-hero-inner">
      <span class="cat-hero-icon">${cat.icon}</span>
      <h1>${cat.name}</h1>
      <p class="cat-hero-sub">${cat.desc} · ${track.name}</p>
      <div class="cat-hero-stats">
        <div class="cat-stat"><div class="cat-stat-n">${cat.counts.gp}</div><div class="cat-stat-l">Grand Prix</div></div>
        <div class="cat-stat"><div class="cat-stat-n">${cat.counts.gold}</div><div class="cat-stat-l">Gold</div></div>
        <div class="cat-stat"><div class="cat-stat-n">${cat.counts.silver}</div><div class="cat-stat-l">Silver</div></div>
        <div class="cat-stat"><div class="cat-stat-n">${cat.counts.bronze}</div><div class="cat-stat-l">Bronze</div></div>
      </div>
    </div>
  </div>`;

  // GRAND PRIX
  if(gp.length){
    html+=`<div class="medal-section reveal">
      <span class="medal-label ml-gp">🏆 Grand Prix</span>
      <h2>Il massimo riconoscimento</h2>
      <div class="win-grid">`;
    gp.forEach(c=>{
      const thumb=thumbURL(c);
      html+=`<div class="win-card${gp.length===1?' full':''}" onclick="navigate('/case/${c.id}')">
        <div class="win-thumb" style="padding-bottom:${gp.length===1?'42%':'56.25%'}">
          ${thumb?`<img src="${thumb}" alt="${c.title}" loading="lazy">`
            :`<div class="win-thumb-placeholder">${cat.icon}</div>`}
          <div class="win-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>
        <div class="win-body">
          <span class="win-medal wm-gp">🏆 Grand Prix</span>
          <div class="win-title">${c.title}</div>
          <div class="win-brand">${c.brand}</div>
          <div class="win-agency">${c.agency}</div>
          <div class="win-excerpt">${c.description.replace(/<[^>]*>/g,'').slice(0,180)}…</div>
        </div>
      </div>`;
    });
    html+=`</div></div><div class="divider"></div>`;
  }

  // GOLD
  if(gold.length){
    html+=`<div class="medal-section reveal">
      <span class="medal-label ml-gold">🥇 Gold Lions</span>
      <h2>${gold.length} Gold in questa categoria</h2>
      <div class="win-grid">`;
    gold.forEach(c=>{
      const thumb=thumbURL(c);
      html+=`<div class="win-card" onclick="navigate('/case/${c.id}')">
        <div class="win-thumb">
          ${thumb?`<img src="${thumb}" alt="${c.title}" loading="lazy">`
            :`<div class="win-thumb-placeholder">${cat.icon}</div>`}
          ${c.video?`<div class="win-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`:''}
        </div>
        <div class="win-body">
          <span class="win-medal wm-gold">🥇 Gold Lion</span>
          <div class="win-title">${c.title}</div>
          <div class="win-brand">${c.brand}</div>
          <div class="win-agency">${c.agency}</div>
          ${c.description?`<div class="win-excerpt">${c.description.replace(/<[^>]*>/g,'').slice(0,140)}…</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div></div><div class="divider"></div>`;
  }

  // SILVER & BRONZE
  html+=`<div class="medal-section reveal">
    <span class="medal-label ml-silver">🥈 Silver Lions</span>
    <h2>${cat.counts.silver} Silver in questa categoria</h2>
    <div class="see-more"><a href="https://www.lovethework.com/en/awards/winners-shortlists/cannes-lions/${catId}?tag=publication+dates%40%40year%40%402026" target="_blank">→ Vedi tutti i Silver Lions su lovethework.com</a></div>
  </div>
  <div class="divider"></div>
  <div class="medal-section reveal">
    <span class="medal-label ml-bronze">🥉 Bronze Lions</span>
    <h2>${cat.counts.bronze} Bronze in questa categoria</h2>
    <div class="see-more"><a href="https://www.lovethework.com/en/awards/winners-shortlists/cannes-lions/${catId}?tag=publication+dates%40%40year%40%402026" target="_blank">→ Vedi tutti i Bronze Lions su lovethework.com</a></div>
  </div>`;

  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  initReveal();
}

function renderCase(caseId){
  const cs=CASES.find(c=>c.id===caseId);
  if(!cs){navigate('/');return;}
  const cat=CATEGORIES.find(c=>c.id===cs.cat);
  const related=getCasesRelated(cs);

  const nb=document.getElementById('nav-back');
  nb.style.display='flex';

  const thumb=thumbURL(cs);

  let html=`
  <div class="case-hero">
    ${cs.video?`<div class="case-video-wrap">${videoEmbed(cs.video)}</div>`
      :(thumb?`<img class="case-img-hero" src="${thumb}" alt="${cs.title}">`
        :`<div style="height:320px;background:linear-gradient(135deg,#1a1a2e,#0d3b5e);display:flex;align-items:center;justify-content:center;font-size:80px">${cat?.icon||'🏆'}</div>`)}
  </div>
  <div class="case-body">
    <div class="case-meta-top">
      <span class="case-medal-badge ${medalClass(cs.medal)}">${medalLabel(cs.medal)}</span>
      <span class="case-cat-tag" style="cursor:pointer" onclick="navigate('/category/${cs.cat}')">${cat?.name||cs.cat}</span>
      <span class="case-cat-tag">${cs.country||''}</span>
    </div>
    <h1 class="case-title">${cs.title}</h1>
    <p class="case-tagline">${cs.brand}${cs.agency?' · '+cs.agency:''}</p>

    <div class="case-info-bar">
      <div class="case-info-item"><div class="case-info-label">Brand</div><div class="case-info-value">${cs.brand}</div></div>
      <div class="case-info-item"><div class="case-info-label">Agenzia</div><div class="case-info-value">${cs.agency||'—'}</div></div>
      ${cs.director?`<div class="case-info-item"><div class="case-info-label">Direttore</div><div class="case-info-value">${cs.director}</div></div>`:''}
      ${cs.production?`<div class="case-info-item"><div class="case-info-label">Produzione</div><div class="case-info-value">${cs.production}</div></div>`:''}
      <div class="case-info-item"><div class="case-info-label">Paese</div><div class="case-info-value">${cs.country||'—'}</div></div>
      <div class="case-info-item"><div class="case-info-label">Anno</div><div class="case-info-value">2026</div></div>
    </div>

    ${cs.description?`<div class="case-description">${cs.description}</div>`:''}

    ${cs.video&&!cs.video.extra?`<div class="case-video-section">
      <h3>Guarda il video</h3>
      <div class="video-embed">${videoEmbed(cs.video)}</div>
    </div>`:''}

    ${cs.credits&&cs.credits.length?`<div class="case-credits">
      <h3>Credits</h3>
      <table class="credits-table">
        ${cs.credits.map(([l,v])=>`<tr><td>${l}</td><td>${v}</td></tr>`).join('')}
      </table>
    </div>`:''}

    ${related.length?`<div class="related-section reveal">
      <h3>Nella stessa categoria</h3>
      <div class="related-grid">
        ${related.map(r=>{
          const rt=thumbURL(r);
          return`<div class="related-card" onclick="navigate('/case/${r.id}')">
            <div class="related-thumb">
              ${rt?`<img src="${rt}" alt="${r.title}" loading="lazy">`:`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e;font-size:36px">${cat?.icon||'🏆'}</div>`}
            </div>
            <div class="related-body">
              <div class="related-title">${r.title}</div>
              <div class="related-brand">${r.brand} · ${medalLabel(r.medal)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}
  </div>`;

  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  initReveal();
}

// =====================================================
// ROUTER
// =====================================================
function route(){
  const hash=location.hash||'#/';
  const path=hash.replace('#','');

  if(path==='/'||path===''){renderHome();return;}

  const parts=path.split('/').filter(Boolean);
  if(parts[0]==='category'&&parts[1]){renderCategory(parts[1]);return;}
  if(parts[0]==='case'&&parts[1]){renderCase(parts[1]);return;}

  renderHome();
}

function initReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:0.08});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

window.addEventListener('hashchange',route);
route();
</script>
