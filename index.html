<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cannes Lions 2026 — Winners</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<style>
/* RESET & VARS */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1d1d1f;--white:#f5f5f7;--off:#fbfbfd;--mid:#86868b;--light:#d2d2d7;
  --blue:#0071e3;--blue2:#0077ed;--gold:#f5a623;--silver:#8e8e93;--bronze:#8d6e63;
  --gp-grad:linear-gradient(135deg,#FFD700,#FFA500);
  --nav:rgba(255,255,255,0.85);--r:18px;--shadow:0 4px 24px rgba(0,0,0,0.08);
  --t:.3s cubic-bezier(.25,.46,.45,.94)
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  background:var(--off);color:var(--black);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:1000;background:var(--nav);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.08);height:52px;display:flex;align-items:center}
.nav-inner{max-width:1280px;width:100%;margin:0 auto;padding:0 24px;
  display:flex;align-items:center;gap:16px}
.nav-logo{font-size:16px;font-weight:700;color:var(--black);text-decoration:none;
  letter-spacing:-0.3px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-right:auto}
.nav-logo span{font-size:20px}
.nav-lucky{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;border:none;
  border-radius:980px;padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:-.2px;transition:transform var(--t),opacity var(--t)}
.nav-lucky:hover{transform:scale(1.04);opacity:.9}
.nav-about{background:none;border:none;font-size:14px;color:var(--mid);cursor:pointer;
  font-family:inherit;font-weight:500;padding:4px 8px;border-radius:6px;
  transition:color var(--t)}
.nav-about:hover{color:var(--black)}
.nav-back{display:none;align-items:center;gap:6px;font-size:14px;color:var(--blue);
  cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 0}
.nav-back:hover{opacity:.7}
.nav-back svg{width:18px;height:18px}
#app{min-height:100vh}

/* ===== HOME HERO ===== */
.hero{background:#000;color:#fff;min-height:82vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;
  position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a1a2e,#000)}
.hero-badge{position:relative;display:inline-block;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);border-radius:100px;padding:6px 16px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,0.75);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:28px;backdrop-filter:blur(10px)}
.hero h1{position:relative;font-size:clamp(52px,9vw,100px);font-weight:700;
  letter-spacing:-3px;line-height:.95;margin-bottom:20px;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,0.55) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{position:relative;font-size:clamp(18px,2.5vw,24px);color:rgba(255,255,255,0.5);
  letter-spacing:-.3px;max-width:560px;margin-bottom:48px}
.hero-stats{position:relative;display:flex;gap:48px;margin-bottom:52px}
.stat-num{font-size:42px;font-weight:700;letter-spacing:-1.5px;color:#fff}
.stat-label{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;
  letter-spacing:1px;margin-top:4px}
.hero-cta{position:relative;display:inline-block;background:var(--blue);color:#fff;
  text-decoration:none;padding:14px 32px;border-radius:980px;font-size:15px;
  font-weight:500;cursor:pointer;border:none;font-family:inherit;
  transition:background var(--t),transform var(--t)}
.hero-cta:hover{background:var(--blue2);transform:scale(1.02)}

/* ===== HERO SEARCH ===== */
.hero-search-wrap{position:relative;width:100%;max-width:640px;margin-top:8px}
.hero-search-btn{display:flex;align-items:center;gap:12px;width:100%;background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.25);border-radius:980px;padding:13px 22px;
  cursor:text;backdrop-filter:blur(12px);transition:background var(--t),border-color var(--t)}
.hero-search-btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.4)}
.hero-search-btn svg{width:18px;height:18px;color:rgba(255,255,255,0.5);flex-shrink:0}
.hero-search-placeholder{font-size:15px;color:rgba(255,255,255,0.45);flex:1;text-align:left}
.hero-search-kbd{font-size:11px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);
  border-radius:4px;padding:2px 7px;font-family:monospace}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.search-overlay.open{display:flex}
.search-modal{width:100%;max-width:760px;background:#fff;border-radius:20px;
  box-shadow:0 32px 80px rgba(0,0,0,.4);overflow:hidden;
  max-height:calc(100vh - 120px);display:flex;flex-direction:column}
.search-input-row{display:flex;align-items:center;gap:0;padding:0 20px;
  border-bottom:1px solid rgba(0,0,0,0.08)}
.search-input-row svg{width:20px;height:20px;color:var(--mid);flex-shrink:0}
.search-input-row input{flex:1;border:none;outline:none;font-size:18px;font-family:inherit;
  padding:20px 14px;color:var(--black);background:transparent}
.search-input-row input::placeholder{color:var(--light)}
.search-close-btn{background:none;border:none;cursor:pointer;padding:8px;
  font-size:16px;color:var(--mid);border-radius:8px;transition:background var(--t)}
.search-close-btn:hover{background:rgba(0,0,0,0.06)}
.search-filters-row{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap;
  border-bottom:1px solid rgba(0,0,0,0.06);background:#fafafa}
.search-filter-select{border:1px solid var(--light);border-radius:980px;padding:5px 12px;
  font-size:12px;font-weight:500;font-family:inherit;color:var(--black);
  background:#fff;cursor:pointer;outline:none;transition:border-color var(--t)}
.search-filter-select:focus{border-color:var(--blue)}
.search-results-area{overflow-y:auto;flex:1;padding:8px 0}
.search-result-item{display:flex;align-items:center;gap:14px;padding:12px 20px;
  cursor:pointer;transition:background var(--t)}
.search-result-item:hover{background:rgba(0,0,0,0.04)}
.search-result-thumb{width:64px;height:40px;border-radius:6px;overflow:hidden;
  background:#1a1a2e;flex-shrink:0}
.search-result-thumb img{width:100%;height:100%;object-fit:cover}
.search-result-thumb-ph{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:18px}
.search-result-info{flex:1;min-width:0}
.search-result-title{font-size:14px;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.search-result-meta{font-size:12px;color:var(--mid);margin-top:2px}
.search-result-medal{flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;padding:3px 8px;border-radius:100px}
.search-empty{padding:40px 20px;text-align:center;color:var(--mid);font-size:14px}
.search-count{font-size:11px;color:var(--mid);padding:10px 20px 2px;
  font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ===== TRACK SECTION (home) ===== */
.track-section{padding:56px 0;border-bottom:1px solid rgba(0,0,0,0.07)}
.track-section:last-of-type{border-bottom:none}
.track-inner{max-width:1280px;margin:0 auto;padding:0 24px}
.track-label{font-size:22px;font-weight:700;color:var(--blue);margin-bottom:32px;
  letter-spacing:-.4px}

/* CATEGORY BLOCKS (home) */
.cat-block{margin-bottom:52px}
.cat-block:last-child{margin-bottom:0}
.cat-block-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;padding-bottom:12px;
  border-bottom:1px solid rgba(0,0,0,0.07)}
.cat-block-name{display:flex;align-items:center;gap:10px}
.cat-block-icon{font-size:24px}
.cat-block-title{font-size:19px;font-weight:700;letter-spacing:-.3px}
.cat-block-link{font-size:13px;color:var(--blue);text-decoration:none;font-weight:500;
  display:flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer}
.cat-block-link:hover{text-decoration:underline}

/* TWO-COL LAYOUT inside cat-block */
.cat-block-body{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:stretch}
.cat-block-body.multi-gp{grid-template-columns:1fr 280px}
.cat-gp-col{min-width:0;display:flex;flex-direction:column}
.cat-gp-grid{display:grid;grid-template-columns:1fr;gap:14px;flex:1}
.cat-gp-grid .win-card{max-height:100%;overflow:hidden}
.cat-gp-grid:not(.multi) .win-card{height:100%}
.cat-gp-grid:not(.multi) .win-thumb{max-height:260px}
.cat-gp-grid.multi{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.cat-medals-col{background:#fff;border-radius:16px;box-shadow:var(--shadow);
  overflow:hidden;border:1px solid rgba(0,0,0,0.05)}
.cat-medals-col-header{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--mid);padding:14px 16px 10px;
  border-bottom:1px solid rgba(0,0,0,0.06);background:#fafafa}
.mi-group{padding:10px 0 4px}
.mi-group-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;padding:4px 16px 6px}
.mi-row{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;
  transition:background var(--t)}
.mi-row:hover{background:rgba(0,113,227,0.05)}
.mi-thumb{width:36px;height:24px;border-radius:4px;overflow:hidden;flex-shrink:0;
  background:#1a1a2e}
.mi-thumb img{width:100%;height:100%;object-fit:cover}
.mi-thumb-ph{width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;font-size:12px}
.mi-info{min-width:0}
.mi-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;color:var(--black)}
.mi-brand{font-size:11px;color:var(--mid);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.mi-more{font-size:11px;color:var(--blue);padding:6px 16px 12px;cursor:pointer}
.mi-more:hover{text-decoration:underline}

@media(max-width:900px){
  .cat-block-body{grid-template-columns:1fr;align-items:start}
  .cat-gp-col{display:block}
  .cat-gp-grid{flex:none}
  .cat-gp-grid:not(.multi) .win-card{height:auto}
  .cat-gp-grid:not(.multi) .win-thumb{max-height:none}
  .cat-medals-col{margin-top:0}
}
@media(max-width:768px){
  .hero-stats{gap:24px}.stat-num{font-size:28px}
  .cat-gp-grid{grid-template-columns:1fr}
  .lucky-info-bar{flex-direction:column}
  .search-modal{border-radius:0;max-height:100vh}
  .search-overlay{padding-top:0;align-items:flex-start}
}

/* WIN CARDS (shared) */
.win-card{background:#fff;border-radius:var(--r);overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow);transition:transform var(--t),box-shadow var(--t);
  display:flex;flex-direction:column}
.win-card:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,0.14)}
.win-thumb{position:relative;width:100%;padding-bottom:56.25%;background:#111;overflow:hidden;flex-shrink:0}
.win-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .5s ease}
.win-card:hover .win-thumb img{transform:scale(1.05)}
.win-thumb-placeholder{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:52px;
  background:linear-gradient(135deg,#1a1a2e 0%,#0d3b5e 100%)}
.win-play{position:absolute;bottom:12px;right:12px;width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center}
.win-play svg{fill:#fff;width:14px;height:14px;margin-left:2px}
.win-body{padding:20px;display:flex;flex-direction:column;flex:1}
.win-medal{display:inline-flex;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;padding:0 12px;height:28px;border-radius:100px;margin-bottom:10px;align-self:flex-start;line-height:1}
.case-meta-top .win-medal{align-self:center;margin-bottom:0}
.wm-gp{background:var(--gp-grad);color:#000}
.wm-gold{background:linear-gradient(135deg,#FFD700,#FFB300);color:#000}
.wm-silver{background:linear-gradient(135deg,#E8E8E8,#A0A0A0);color:#333}
.wm-bronze{background:linear-gradient(135deg,#CD7F32,#8D6E63);color:#fff}
.win-title{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.25;margin-bottom:4px}
.win-brand{font-size:13px;color:var(--mid);font-weight:500;margin-bottom:2px}
.win-agency{font-size:12px;color:var(--light);margin-bottom:8px}
.win-excerpt{font-size:13px;color:#515154;line-height:1.55;margin-bottom:12px;flex:1}
.win-cta{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
  color:var(--blue);background:rgba(0,113,227,0.08);border-radius:980px;
  padding:7px 16px;margin-top:auto;align-self:flex-start;border:none;cursor:pointer;
  font-family:inherit;transition:background var(--t),transform var(--t)}
.win-cta:hover{background:rgba(0,113,227,0.15);transform:translateX(2px)}
.win-cta svg{width:14px;height:14px;flex-shrink:0}

/* MEDAL SECTIONS (category page) */
.medal-section{max-width:1280px;margin:0 auto;padding:48px 24px}
.medal-label-pill{display:inline-flex;align-items:center;gap:8px;border-radius:100px;
  padding:6px 18px;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:20px}
.ml-gp{background:var(--gp-grad);color:#000}
.ml-gold{background:linear-gradient(135deg,#FFD700,#FFB300);color:#000}
.ml-silver{background:linear-gradient(135deg,#E8E8E8,#9E9E9E);color:#333}
.ml-bronze{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.medal-section h2{font-size:clamp(20px,2.8vw,30px);font-weight:700;letter-spacing:-.5px;margin-bottom:28px}
.win-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.win-grid.full-width .win-card:first-child:last-child{max-width:680px}
.divider{height:1px;background:rgba(0,0,0,0.07);max-width:1280px;margin:0 auto}

/* CATEGORY PAGE HERO */
.cat-hero{background:#000;color:#fff;padding:72px 24px 56px;text-align:center}
.cat-hero-inner{max-width:800px;margin:0 auto}
.cat-hero-icon{font-size:52px;margin-bottom:16px;display:block}
.cat-hero h1{font-size:clamp(32px,5.5vw,68px);font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:14px}
.cat-hero-sub{font-size:17px;color:rgba(255,255,255,0.5);margin-bottom:24px}
.cat-hero-stats{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.cat-stat-n{font-size:26px;font-weight:700;color:#fff;letter-spacing:-1px}
.cat-stat-l{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* CASE STUDY PAGE */
.case-video-wrap{width:100%;background:#000}
.case-video-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.case-img-hero{width:100%;max-height:560px;object-fit:cover;display:block}
.case-body{max-width:900px;margin:0 auto;padding:52px 24px 80px}
.case-meta-top{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.case-cat-tag{display:inline-flex;align-items:center;font-size:11px;color:var(--mid);background:rgba(0,0,0,0.06);
  border-radius:100px;padding:0 12px;height:28px;font-weight:500;cursor:pointer;line-height:1}
.case-cat-tag:hover{background:rgba(0,113,227,0.1);color:var(--blue)}
.case-title{font-size:clamp(26px,5vw,52px);font-weight:700;letter-spacing:-1.5px;
  line-height:1.05;margin-bottom:10px}
.case-tagline{font-size:17px;color:var(--mid);margin-bottom:30px}
.case-info-bar{display:flex;gap:28px;padding:22px 0;
  border-top:1px solid rgba(0,0,0,0.08);border-bottom:1px solid rgba(0,0,0,0.08);
  margin-bottom:36px;flex-wrap:wrap}
.case-info-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:var(--mid);font-weight:600;margin-bottom:4px}
.case-info-value{font-size:14px;font-weight:600;letter-spacing:-.2px}
.case-description{font-size:17px;line-height:1.72;color:#3a3a3c;margin-bottom:36px}
.case-description p{margin-bottom:16px}
.video-embed{border-radius:var(--r);overflow:hidden;background:#000;margin-bottom:36px}
.video-embed iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.credits-table{width:100%;border-collapse:collapse;border-radius:12px;overflow:hidden;
  border:1px solid rgba(0,0,0,0.08);margin-bottom:36px}
.credits-table tr:last-child td{border-bottom:none}
.credits-table td{padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:14px}
.credits-table td:first-child{font-size:11px;text-transform:uppercase;letter-spacing:.6px;
  color:var(--mid);font-weight:700;background:#f9f9fb;width:140px}
.related-section{margin-top:52px;padding-top:36px;border-top:1px solid rgba(0,0,0,0.08)}
.related-section h3{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:20px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.related-card{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);transition:transform var(--t)}
.related-card:hover{transform:translateY(-3px)}
.related-thumb{width:100%;padding-bottom:56.25%;position:relative;background:#1a1a2e}
.related-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.related-thumb-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.related-body{padding:12px}
.related-title{font-size:13px;font-weight:600;margin-bottom:2px}
.related-brand{font-size:11px;color:var(--mid)}

/* SPECIAL AWARDS */
.special-section{background:#1d1d1f;color:#fff;padding:64px 24px}
.special-inner{max-width:1280px;margin:0 auto}
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:24px}
.special-card{background:#2c2c2e;border-radius:var(--r);padding:22px}
.special-rank{font-size:30px;font-weight:700;color:var(--gold);letter-spacing:-1px;margin-bottom:4px}
.special-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.special-label{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.8px}

/* TRACK BADGE */
.track-badge{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;padding:3px 10px;border-radius:100px}
.tb-classic{background:#e8f0fe;color:#1a73e8}
.tb-craft{background:#fce8e6;color:#d93025}
.tb-entertainment{background:#fff3e0;color:#e65100}
.tb-experience{background:#e8f5e9;color:#2e7d32}
.tb-strategy{background:#f3e8fd;color:#6a1b9a}
.tb-engagement{background:#e3f2fd;color:#0d47a1}
.tb-good{background:#f1f8e9;color:#33691e}
.tb-design{background:#fbe9e7;color:#bf360c}
.tb-innovation{background:#e0f7fa;color:#006064}
.tb-brand{background:#fdf1f8;color:#880e4f}
.tb-titanium{background:#263238;color:#fff}

/* ===== LUCKY PAGE ===== */
.lucky-page{position:relative;min-height:100vh;background:#000;overflow:hidden;
  display:flex;flex-direction:column}
.lucky-stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.lucky-stars span{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--del,0s) infinite alternate}
@keyframes twinkle{0%{opacity:.1;transform:scale(.8)}100%{opacity:.9;transform:scale(1.2)}}
.lucky-filmstrip{position:relative;z-index:1;overflow:hidden;height:56px;background:#111;
  border-bottom:2px solid rgba(255,215,0,0.2);display:flex;align-items:center;flex-shrink:0}
.filmstrip-track{display:flex;gap:4px;padding:4px 8px;animation:scroll-strip 30s linear infinite;
  width:max-content}

<script>
// ===================== HELPERS =====================
function yt(id){return id?`https://img.youtube.com/vi/${id}/hqdefault.jpg`:'';}
function thumbURL(c){
  if(c.thumb) return c.thumb;
  if(c.video?.type==='youtube'&&c.video.id) return yt(c.video.id);
  return '';
}
function videoEmbed(v){
  if(!v) return '';
  if(v.type==='youtube'&&v.id) return`<iframe src="https://www.youtube.com/embed/${v.id}?rel=0" loading="lazy" allowfullscreen></iframe>`;
  if(v.type==='vimeo'&&v.id) return`<iframe src="https://player.vimeo.com/video/${v.id}?dnt=1" loading="lazy" allowfullscreen></iframe>`;
  return '';
}
function medalLabel(m){return{grandprix:'🏆 Grand Prix',gold:'🥇 Gold Lion',silver:'🥈 Silver Lion',bronze:'🥉 Bronze Lion'}[m]||m;}
function medalClass(m){return{grandprix:'wm-gp',gold:'wm-gold',silver:'wm-silver',bronze:'wm-bronze'}[m]||'wm-bronze';}
function mlClass(m){return{grandprix:'ml-gp',gold:'ml-gold',silver:'ml-silver',bronze:'ml-bronze'}[m]||'ml-bronze';}
function navigate(path){location.hash='#'+path;}
function getCat(id){return CATEGORIES.find(c=>c.id===id);}
function getCasesByCat(catId){return CASES.filter(c=>c.cat===catId);}
function getCasesRelated(cs){return CASES.filter(c=>c.cat===cs.cat&&c.id!==cs.id).slice(0,4);}
function navMode(mode){
  document.getElementById('nav-back').style.display = mode==='back'?'flex':'none';
}
function initReveal(){
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}
  }),{threshold:0.07});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

// ===================== CARD BUILDER =====================
function winCard(c,catIcon,full){
  const cat=getCat(c.cat);
  const thumb=thumbURL(c);
  const hasVideo=c.video&&(c.video.id||c.video.type);
  const excerpt=c.description?c.description.replace(/<[^>]*>/g,'').slice(0,140)+'…':'';
  return`
<div class="win-card${full?' full':''}" onclick="navigate('/case/${c.id}')">
  <div class="win-thumb">
    ${thumb?`<img src="${thumb}" alt="${c.title}" loading="lazy">`
      :`<div class="win-thumb-placeholder">${catIcon||'🏆'}</div>`}
    ${hasVideo?`<div class="win-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`:''}
  </div>
  <div class="win-body">
    <span class="win-medal ${medalClass(c.medal)}">${medalLabel(c.medal)}</span>
    <div class="win-title">${c.title}</div>
    <div class="win-brand">${c.brand}</div>
    ${c.agency?`<div class="win-agency">${c.agency}</div>`:''}
    ${excerpt?`<div class="win-excerpt">${excerpt}</div>`:''}
    <button class="win-cta">Scopri di più
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </button>
  </div>
</div>`;
}

// ===================== SEARCH =====================
window._search={q:'',medal:'',cat:'',country:'',agency:''};

function openSearch(){
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
  runSearch();
}
function closeSearch(){
  document.getElementById('search-overlay').classList.remove('open');
}
function handleSearchInput(val){
  window._search.q=val;
  runSearch();
}
function handleFilterChange(key,val){
  window._search[key]=val;
  runSearch();
}
function runSearch(){
  const {q,medal,cat,country,agency}=window._search;
  const ql=q.toLowerCase().trim();
  let results=CASES.filter(c=>{
    if(medal&&c.medal!==medal) return false;
    if(cat&&c.cat!==cat) return false;
    if(country&&!(c.country||'').toLowerCase().includes(country.toLowerCase())) return false;
    if(agency&&!(c.agency||'').toLowerCase().includes(agency.toLowerCase())) return false;
    if(ql&&![c.title,c.brand,c.agency,c.country,c.cat].join(' ').toLowerCase().includes(ql)) return false;
    return true;
  });
  const area=document.getElementById('search-results');
  if(!area) return;
  if(!results.length){
    area.innerHTML=`<div class="search-empty">Nessun risultato trovato per i filtri selezionati.</div>`;
    return;
  }
  const count=document.getElementById('search-count');
  if(count) count.textContent=`${results.length} risultat${results.length===1?'o':'i'}`;
  area.innerHTML=results.map(c=>{
    const cat=getCat(c.cat);
    const thumb=thumbURL(c);
    return`<div class="search-result-item" onclick="closeSearch();navigate('/case/${c.id}')">
      <div class="search-result-thumb">
        ${thumb?`<img src="${thumb}" alt="" loading="lazy">`:`<div class="search-result-thumb-ph">${cat?.icon||'🏆'}</div>`}
      </div>
      <div class="search-result-info">
        <div class="search-result-title">${c.title}</div>
        <div class="search-result-meta">${c.brand}${c.agency?' · '+c.agency:''} · ${cat?.name||c.cat} ${c.country||''}</div>
      </div>
      <span class="search-result-medal ${medalClass(c.medal)}">${medalLabel(c.medal)}</span>
    </div>`;
  }).join('');
}

// Build search overlay HTML (injected once into body)
function injectSearchOverlay(){
  const catOptions=CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  const countries=[...new Set(CASES.map(c=>c.country).filter(Boolean))].sort();
  const countryOptions=countries.map(c=>`<option value="${c}">${c}</option>`).join('');
  const overlay=document.createElement('div');
  overlay.className='search-overlay';
  overlay.id='search-overlay';
  overlay.onclick=e=>{if(e.target===overlay)closeSearch();};
  overlay.innerHTML=`
<div class="search-modal">
  <div class="search-input-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Cerca case study, brand, agenzia…"
      oninput="handleSearchInput(this.value)"
      onkeydown="if(event.key==='Escape')closeSearch()">
    <button class="search-close-btn" onclick="closeSearch()">✕</button>
  </div>
  <div class="search-filters-row">
    <select class="search-filter-select" onchange="handleFilterChange('medal',this.value)">
      <option value="">Tutti i premi</option>
      <option value="grandprix">🏆 Grand Prix</option>
      <option value="gold">🥇 Gold Lion</option>
      <option value="silver">🥈 Silver Lion</option>
      <option value="bronze">🥉 Bronze Lion</option>
    </select>
    <select class="search-filter-select" onchange="handleFilterChange('cat',this.value)">
      <option value="">Tutte le categorie</option>${catOptions}
    </select>
    <select class="search-filter-select" onchange="handleFilterChange('country',this.value)">
      <option value="">Tutti i paesi</option>${countryOptions}
    </select>
    <input class="search-filter-select" type="text" placeholder="Agenzia…"
      oninput="handleFilterChange('agency',this.value)"
      style="width:140px;border-radius:980px;padding:5px 12px;font-size:12px;outline:none">
  </div>
  <div class="search-count" id="search-count"></div>
  <div class="search-results-area" id="search-results"></div>
</div>`;
  document.body.appendChild(overlay);
}

function renderCategory(catId){
  const cat=getCat(catId);
  if(!cat){navigate('/');return;}
  navMode('back');
  const track=TRACKS[cat.track];
  const cases=getCasesByCat(catId);
  const byMedal=m=>cases.filter(c=>c.medal===m);
  const gp=byMedal('grandprix'), gold=byMedal('gold'),
        silver=byMedal('silver'), bronze=byMedal('bronze');

  const bgColor={classic:'#0d1b3e',craft:'#3b0a0a',entertainment:'#2d1800',
    experience:'#0a2d0f',strategy:'#1e0a3b',engagement:'#0a1a3b',
    good:'#0a2d12',design:'#2d0a06',innovation:'#001a1c',brand:'#2d0a1e',titanium:'#1c1c1e'}[cat.track]||'#000';

  let html=`
<div class="cat-hero" style="background:${bgColor}">
  <div class="cat-hero-inner">
    <span class="cat-hero-icon">${cat.icon}</span>
    <h1>${cat.name}</h1>
    <p class="cat-hero-sub">${cat.desc} · ${track.name}</p>
    <div class="cat-hero-stats">
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.gp}</div><div class="cat-stat-l">Grand Prix</div></div>
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.gold}</div><div class="cat-stat-l">Gold</div></div>
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.silver}</div><div class="cat-stat-l">Silver</div></div>
      <div class="cat-stat"><div class="cat-stat-n">${cat.counts.bronze}</div><div class="cat-stat-l">Bronze</div></div>
    </div>
  </div>
</div>`;

  function medalSection(list, medal, label){
    if(!list.length) return '';
    const isGP=medal==='grandprix';
    return`<div class="medal-section reveal">
      <span class="medal-label-pill ${mlClass(medal)}">${medalLabel(medal)}</span>
      <h2>${isGP?'Il massimo riconoscimento':label+' in questa categoria'}</h2>
      <div class="win-grid">
        ${list.map(c=>winCard(c,cat.icon,isGP&&list.length===1)).join('')}
      </div>
    </div><div class="divider"></div>`;
  }

  html += medalSection(gp,'grandprix','Grand Prix');
  html += medalSection(gold,'gold',`${gold.length} Gold Lion`);
  html += medalSection(silver,'silver',`${silver.length} Silver Lion`);
  html += medalSection(bronze,'bronze',`${bronze.length} Bronze Lion`);

  if(!silver.length||!bronze.length){
    html+=`<div class="medal-section" style="text-align:center;padding:32px 24px">
      <p style="font-size:14px;color:var(--mid)">Per la lista completa dei vincitori visita
        <a href="https://www.lovethework.com" target="_blank" style="color:var(--blue)">lovethework.com</a>
      </p>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
  window.scrollTo(0,0);
  initReveal();
}

// ===================== LUCKY PAGE =====================
window._luckyFilters={grandprix:true,gold:true,silver:false,bronze:false};

function luckyBuildPool(){
  const f=window._luckyFilters;
  const pool=CASES.filter(c=>f[c.medal]);
  window._luckyShuffled=[...pool].sort(()=>Math.random()-.5);
  window._luckyIdx=-1;
  // update counter
  const cnt=document.getElementById('lucky-counter');
  if(cnt) cnt.textContent=`${pool.length} case nel pool • Premi per estrarne uno`;
}

function luckyToggleMedal(medal){
  window._luckyFilters[medal]=!window._luckyFilters[medal];
  // keep at least one active
  if(!Object.values(window._luckyFilters).some(Boolean)){
    window._luckyFilters[medal]=true; return;
  }
  // update pill UI
  document.querySelectorAll('.lucky-pill').forEach(el=>{
    const m=el.dataset.medal;
    el.classList.toggle('active',!!window._luckyFilters[m]);
  });
  luckyBuildPool();
  // reset showcase
  const sc=document.getElementById('lucky-showcase');
  if(sc){
    sc.innerHTML=`<div class="lucky-no-media">🦁</div>
    <div class="lucky-info-bar"><div class="lucky-info-left">
      <div class="lucky-info-title" style="color:rgba(255,255,255,0.3);font-style:italic">Pool aggiornato — estrai un nuovo vincitore…</div>
    </div></div>`;
  }
  const btn=document.getElementById('lucky-btn');
  if(btn) btn.innerHTML=`<span class="dice">🎲</span> Estrai un vincitore`;
}

function renderLucky(){
  navMode('back');

  // Generate starfield
  let stars='';
  for(let i=0;i<80;i++){
    const size=Math.random()*3+1, x=Math.random()*100, y=Math.random()*100;
    const d=Math.random()*4+2, del=Math.random()*4;
    stars+=`<span style="width:${size}px;height:${size}px;left:${x}%;top:${y}%;--d:${d}s;--del:${del}s"></span>`;
  }

  // Filmstrip — use all YT cases
  const ytCases=CASES.filter(c=>c.video?.type==='youtube'&&c.video.id);
  let frames='';
  [...ytCases,...ytCases].forEach(c=>{
    frames+=`<div class="filmstrip-hole"></div>
    <div class="filmstrip-frame"><img src="${yt(c.video.id)}" loading="lazy" alt=""></div>
    <div class="filmstrip-hole"></div>`;
  });

  // Medal pills
  const pills=[
    {medal:'grandprix',label:'Grand Prix',cls:'wm-gp'},
    {medal:'gold',label:'Gold Lion',cls:'wm-gold'},
    {medal:'silver',label:'Silver Lion',cls:'wm-silver'},
    {medal:'bronze',label:'Bronze Lion',cls:'wm-bronze'},
  ];
  const pillsHtml=pills.map(p=>`
    <button class="lucky-pill ${window._luckyFilters[p.medal]?'active':''}"
      data-medal="${p.medal}" onclick="luckyToggleMedal('${p.medal}')">
      <span class="win-medal ${p.cls}" style="pointer-events:none">${p.label}</span>
    </button>`).join('');

  document.getElementById('app').innerHTML=`
<div class="lucky-page">
  <div class="lucky-scan-line"></div>
  <div class="lucky-stars">${stars}</div>
  <div class="lucky-filmstrip">
    <div class="filmstrip-track">${frames}</div>
  </div>
  <div class="lucky-main">
    <div class="lucky-header">
      <div class="lucky-eyebrow">🦁 Cannes Lions 2026 — I'm Feeling Lucky</div>
      <div class="lucky-counter" id="lucky-counter">Caricamento…</div>
    </div>
    <div class="lucky-pills-row">${pillsHtml}</div>
    <div class="lucky-showcase" id="lucky-showcase">
      <div class="lucky-no-media">🦁</div>
      <div class="lucky-info-bar">
        <div class="lucky-info-left">
          <div class="lucky-info-title" style="color:rgba(255,255,255,0.3);font-style:italic">Seleziona i premi e premi il dado…</div>
        </div>
      </div>
    </div>
    <div class="lucky-actions">
      <button class="lucky-roll-btn" id="lucky-btn" onclick="luckyRoll()">
        <span class="dice">🎲</span> Estrai un vincitore
      </button>
      <div class="lucky-hint">Ogni estrazione è casuale · ⌘K per cercare · tasto di nuovo per il prossimo</div>
    </div>
  </div>
</div>`;

  luckyBuildPool();
}

function luckyRoll(){
  const btn=document.getElementById('lucky-btn');
  const showcase=document.getElementById('lucky-showcase');
  const counter=document.getElementById('lucky-counter');
  const pool=window._luckyShuffled||[];
  if(!pool.length) return;

  btn.classList.add('rolling');
  showcase.classList.add('fading');

  setTimeout(()=>{
    window._luckyIdx=(window._luckyIdx+1)%pool.length;
    const c=pool[window._luckyIdx];
    const cat=getCat(c.cat);
    const thumb=thumbURL(c);
    const hasVideo=c.video&&c.video.id;

    let mediaHtml='';
    if(hasVideo) mediaHtml=`<div class="lucky-video-wrap">${videoEmbed(c.video)}</div>`;
    else if(thumb) mediaHtml=`<div class="lucky-img-wrap"><img src="${thumb}" alt="${c.title}"></div>`;
    else mediaHtml=`<div class="lucky-no-media">${cat?.icon||'🏆'}</div>`;

    showcase.innerHTML=`
      ${mediaHtml}
      <div class="lucky-info-bar">
        <div class="lucky-info-left">
          <div class="lucky-info-medal win-medal ${medalClass(c.medal)}">${medalLabel(c.medal)}</div>
          <div class="lucky-info-title">${c.title}</div>
          <div class="lucky-info-brand">${c.brand}${c.agency?' · '+c.agency:''}</div>
          <div class="lucky-info-cat">${cat?.icon||''} ${cat?.name||c.cat} · ${c.country||''}</div>
        </div>
        <button class="lucky-details-btn" onclick="navigate('/case/${c.id}')">Scopri di più →</button>
      </div>`;

    showcase.classList.remove('fading');
    btn.classList.remove('rolling');
    btn.innerHTML=`<span class="dice">🎲</span> Prossimo vincitore`;
    counter.textContent=`Vincitore #${window._luckyIdx+1} di ${pool.length} · ${cat?.name||''}`;
  },380);
}

  <div class="about-section reveal">

      <div class="about-section-content">
        <h2>Cannes Lions 2026 — Winners Archive</h2>
        <p>Questo sito nasce da una domanda semplice: <strong>perché i vincitori del festival più importante della creatività pubblicitaria mondiale sono così difficili da esplorare?</strong> I dati ci sono, le campagne anche — ma l'esperienza di navigarle è spesso dispersiva, frammentata tra comunicati stampa, PDF e siti di categoria.</p>
        <p>L'idea è stata raccogliere tutti i Grand Prix, Gold, Silver e Bronze di Cannes Lions 2026 in un'unica esperienza digitale — organizzata per categoria, track e livello di premio — con video, descrizioni, credits e pagine dedicate per ogni case study.</p>
        <p>Il sito è costruito come <strong>Single Page Application</strong> con routing hash-based, completamente statico su GitHub Pages — zero backend, zero dipendenze esterne, massima velocità. Il design punta su tipografia system-font, whitespace generoso, card layout e transizioni fluide.</p>

          <div class="about-stat-cell">
            <div class="about-stat-n">29</div>

        <p>Il progetto include una <strong>pagina "I'm Feeling Lucky"</strong> che estrae un vincitore casuale dal pool — filtrabile per tipologia di premio — e una <strong>barra di ricerca</strong> stile Spotlight (⌘K) che permette di filtrare per testo, categoria, paese, agenzia e livello di premio.</p>
        <p>Realizzato interamente con <strong>Claude</strong> di Anthropic in una sessione di lavoro in Cowork mode.</p>

// ===================== ROUTER =====================
function route(){
  const hash=location.hash||'#/';
  const path=hash.replace('#','');
  if(path==='/'||path===''){renderHome();return;}
  if(path==='/lucky'){renderLucky();return;}
  if(path==='/about'){renderAbout();return;}
  const parts=path.split('/').filter(Boolean);
  if(parts[0]==='category'&&parts[1]){renderCategory(parts[1]);return;}
  if(parts[0]==='case'&&parts[1]){renderCase(parts[1]);return;}
  renderHome();
}

window.addEventListener('hashchange',route);

// ⌘K shortcut
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}
  if(e.key==='Escape'){closeSearch();}
});

// Inject search overlay once on load
injectSearchOverlay();
